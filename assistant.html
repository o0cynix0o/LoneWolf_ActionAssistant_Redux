    function slugCardTitle(title, fallback) {
      const slug = text(title, fallback)
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');

    function normalizeCardId(scope, id) {
      const value = text(id).trim();
      if (scope === 'tabs' && value === 'section') return 'tabs';

    function applyCardOrder(scope, cards) {
      const parent = cards[0]?.parentElement;
      if (!parent) return cards;
      const layout = getCardLayout(scope);
      if (!layout.length) return cards;
      const byId = new Map(cards.map((card) => [card.dataset.cardId, card]));
      const ordered = [];
      layout.forEach((id) => {
        const card = byId.get(id);
        if (card && !ordered.includes(card)) ordered.push(card);
      });
      cards.forEach((card) => {
        if (!ordered.includes(card)) ordered.push(card);
      });
      ordered.forEach((card) => parent.appendChild(card));
      return ordered;
    }

    function cardMenuHtml(scope, id, title, size, options) {
      const movementDisabled = options.movable === false ? 'disabled' : '';

      const sizeButton = (value, label) => `<button type="button" class="${size === value ? 'active' : ''}" data-card-size="${scope}:${id}:${value}">${label}</button>`;
      return `
        <button class="card-menu-button" type="button" data-card-menu-toggle="${escapeHtml(scope)}:${escapeHtml(id)}" aria-label="${escapeHtml(title)} menu" title="${escapeHtml(title)} menu"></button>

            <button type="button" data-card-move="${escapeHtml(scope)}:${escapeHtml(id)}:up" ${movementDisabled}>Up</button>
            <button type="button" data-card-move="${escapeHtml(scope)}:${escapeHtml(id)}:down" ${movementDisabled}>Down</button>
            <button type="button" data-card-move="${escapeHtml(scope)}:${escapeHtml(id)}:left" ${movementDisabled}>Left</button>
            <button type="button" data-card-move="${escapeHtml(scope)}:${escapeHtml(id)}:right" ${movementDisabled}>Right</button>
          </div>
          <div class="menu-heading">Size</div>
          <div class="menu-row three">
            ${sizeButton('small', 'Small')}
            ${sizeButton('medium', 'Medium')}
            ${sizeButton('large', 'Large')}
          </div>
          <button type="button" class="danger" data-card-close="${escapeHtml(scope)}:${escapeHtml(id)}" ${closeDisabled}>Close Card</button>
        </div>
      `;
    }

    function cardCollapseButtonHtml(scope, id, title, collapsed) {
      const action = collapsed ? 'Expand' : 'Collapse';
      return `<button class="card-collapse-button" type="button" data-card-collapse="${escapeHtml(scope)}:${escapeHtml(id)}" aria-label="${action} ${escapeHtml(title)} card" aria-expanded="${collapsed ? 'false' : 'true'}" title="${action} card"></button>`;
    }

    function decorateCards(scope, cards, options = {}) {
      const actualCards = arr(cards).filter(Boolean);
      if (!actualCards.length) return;
      const seen = {};
      actualCards.forEach((card) => {
        const title = cardTitle(card);
        const base = slugCardTitle(title, 'card');
        seen[base] = (seen[base] || 0) + 1;
        const id = seen[base] === 1 ? base : `${base}-${seen[base]}`;
        card.dataset.cardScope = scope;
        card.dataset.cardId = id;
        card.dataset.cardTitle = title;
        rememberCardLabel(scope, id, title);
      });
      const ordered = options.movable === false ? actualCards : applyCardOrder(scope, actualCards);
      const closed = new Set(getClosedCards(scope));
      const collapsedCards = new Set(getCollapsedCards(scope));
      ordered.forEach((card) => {
        const id = card.dataset.cardId;
        const title = card.dataset.cardTitle || cardTitle(card);
        const defaultSize = options.defaultSize || 'large';
        const size = getCardSize(scope, id, defaultSize);
        const collapsed = collapsedCards.has(id);
        card.hidden = closed.has(id);
        card.classList.add('dashboard-card');
        card.classList.toggle('card-collapsed', collapsed);
        card.classList.remove('card-size-small', 'card-size-medium', 'card-size-large');
        card.classList.add(`card-size-${size}`);
        card.querySelector(':scope > .card-collapse-button')?.remove();
        card.querySelector(':scope > .card-collapsed-title')?.remove();
        card.querySelector(':scope > .card-menu-button')?.remove();
        card.querySelector(':scope > .card-menu')?.remove();
        card.insertAdjacentHTML('afterbegin', `<div class="card-collapsed-title">${escapeHtml(title)}</div>`);
        card.insertAdjacentHTML('afterbegin', cardCollapseButtonHtml(scope, id, title, collapsed));
        card.insertAdjacentHTML('afterbegin', cardMenuHtml(scope, id, title, size, options));
        const help = cardHelp(title, scope);
        const helpTarget = card.querySelector(':scope > h2') || card.querySelector(':scope > .quick-title') || card.querySelector('.combat-meter-title-row h2');
        if (help && helpTarget) {
          helpTarget.title = help;
          helpTarget.dataset.cardHelp = 'true';
        }
      });
    }

    function decorateInterfaceCards(scope) {
      const viewScope = cardScopeForView(scope);
      view.classList.add('view-card-grid');
      tabs.dataset.cardTitleOverride = 'Tabs';
      decorateCards('quick', Array.from(quickPanel.querySelectorAll(':scope > .quick-card')), { defaultSize: 'medium' });
      decorateCards('tabs', [tabs], { defaultSize: 'large', movable: false });
      if (quickTabsDivider) quickTabsDivider.hidden = tabs.hidden;
      decorateCards(viewScope, Array.from(view.querySelectorAll(':scope > .panel')), { defaultSize: 'large' });
    }

    function moveCard(scope, id, direction) {
      const cards = Array.from(document.querySelectorAll('[data-card-scope]')).filter((card) => card.dataset.cardScope === scope);
      const ids = cards.map((card) => card.dataset.cardId).filter(Boolean);
      if (!ids.includes(id)) return;
      const index = ids.indexOf(id);
      const next = ['up', 'left'].includes(direction) ? index - 1 : index + 1;
      if (next < 0 || next >= ids.length) return;
      [ids[index], ids[next]] = [ids[next], ids[index]];
      setCardLayout(scope, ids);
      render();
    }

    function closeCard(scope, id) {
      const closed = new Set(getClosedCards(scope));
      const normalizedId = normalizeCardId(scope, id);
      closed.add(normalizedId);
      setClosedCards(scope, Array.from(closed));
      document.querySelectorAll('[data-card-scope][data-card-id]').forEach((card) => {
        if (card.dataset.cardScope === scope && normalizeCardId(scope, card.dataset.cardId) === normalizedId) {
          card.hidden = true;
        }
      });
      closeMenus();
      render();
    }

    function openCard(scope, id) {
      const normalizedId = normalizeCardId(scope, id);
      setClosedCards(scope, getClosedCards(scope).filter((item) => normalizeCardId(scope, item) !== normalizedId));
      render();
    }

    function toggleCardCollapsed(scope, id) {
      const normalizedId = normalizeCardId(scope, id);
      const collapsed = new Set(getCollapsedCards(scope));
      if (collapsed.has(normalizedId)) collapsed.delete(normalizedId);
      else collapsed.add(normalizedId);
      setCollapsedCards(scope, Array.from(collapsed));
      closeMenus();
      render();
    }

    function resetCardScope(scope) {
      [cardLayoutPrefix, cardSizePrefix, cardClosedPrefix, cardCollapsedPrefix].forEach((prefix) => localStorage.removeItem(cardStorageKey(prefix, scope)));
      persistUiPreferences(true);
      render();
    }

    function resetAllCardLayouts() {
      const prefixes = [cardLayoutPrefix, cardSizePrefix, cardClosedPrefix, cardCollapsedPrefix];
      Object.keys(localStorage)
        .filter((key) => prefixes.some((prefix) => key.startsWith(prefix)))
        .forEach((key) => localStorage.removeItem(key));
      persistUiPreferences(true);
      render();
    }

    function closeMenus() {
      appMenu.hidden = true;
      activeCardMenu = '';
      document.querySelectorAll('.card-menu').forEach((menu) => { menu.hidden = true; });
    }

    function toggleCardMenu(scope, id) {
      const token = `${scope}:${id}`;
      const currentMenu = Array.from(document.querySelectorAll('[data-card-menu]')).find((menu) => menu.dataset.cardMenu === token);
      const wasOpen = activeCardMenu === token && currentMenu && !currentMenu.hidden;
      closeMenus();
      if (wasOpen) return;
      const menu = Array.from(document.querySelectorAll('[data-card-menu]')).find((item) => item.dataset.cardMenu === token);
      if (menu) {
        menu.hidden = false;
        activeCardMenu = token;
      }
    }

    function hiddenCardEntries() {
      const entries = [];
      hiddenCardScopes().forEach((scope) => {
        const labels = getCardLabels(scope);
        getClosedCards(scope).forEach((id) => {
          entries.push({
            scope,
            id,
            label: labels[id] || fallbackCardLabel(scope, id)
          });
        });
      });
      return entries.sort((a, b) => `${a.scope}:${a.label}`.localeCompare(`${b.scope}:${b.label}`));
    }

    function hiddenCardScopes() {
      const scopes = new Set(['quick', 'tabs']);
      views.forEach(([id]) => scopes.add(cardScopeForView(id)));
      scopes.add(cardScopeForView('settings'));
      Object.keys(localStorage).forEach((key) => {
        if (key.startsWith(cardClosedPrefix)) scopes.add(key.slice(cardClosedPrefix.length));
      });
      return Array.from(scopes).filter(Boolean);
    }

    function fallbackCardLabel(scope, id) {
      const key = normalizeCardId(scope, id);
      const quickLabels = {
        section: 'Section',
        vitals: 'Vitals',
        'add-item': 'Add Item',
        'drop-item': 'Drop Item'
      };
      if (scope === 'quick') return quickLabels[key] || key;
      if (scope === 'tabs') return 'Tabs';
      return key
        .split('-')
        .filter(Boolean)
        .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
        .join(' ') || 'Section';
    }

    function renderAppMenu() {
      appMenu.innerHTML = `
        <div class="menu-heading">Assistant</div>
        <div class="menu-heading">Mode</div>
        <div class="menu-row three">
          <button type="button" class="${playMode === 'auto' ? 'active' : ''}" data-mode-set="auto">Auto</button>
          <button type="button" class="${playMode === 'manual' ? 'active' : ''}" data-mode-set="manual">Manual</button>
          <button type="button" class="${playMode === 'cli' ? 'active' : ''}" data-mode-set="cli">CLI</button>
        </div>
        <button type="button" data-save-current>Save Game</button>
        <button type="button" data-export-save>Export Current Save</button>
        <button type="button" data-backup-saves>Backup Saves</button>
        <button type="button" data-autosave>Autosave: On</button>
        <button type="button" data-settings-view>Settings</button>
        <button type="button" class="danger" data-shutdown-app>Shut Down App</button>
      `;
    }

    function topWidgetLabel(id) {
      const widget = topWidgets.find(([key]) => key === id);
      return widget ? widget[1] : id;
    }

    function sizeStorageKey(scope) {
      return scope === 'top' ? topSizeKey : sheetSizeKey;
    }

    function normalizeWidgetSize(size) {
      return sizeOrder.includes(size) ? size : 'normal';
    }

    function getWidgetSizes(scope) {
      try {
        const saved = localStorage.getItem(sizeStorageKey(scope));
        const parsed = saved ? JSON.parse(saved) : {};
        return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
      } catch {
        return {};
      }
    }

    function getWidgetSize(scope, id) {
      return normalizeWidgetSize(getWidgetSizes(scope)[id]);
    }

    function setWidgetSize(scope, id, size) {
      const sizes = getWidgetSizes(scope);
      const nextSize = normalizeWidgetSize(size);
      if (nextSize === 'normal') delete sizes[id];
      else sizes[id] = nextSize;
      setJsonStorage(sizeStorageKey(scope), sizes);
      render();
    }

    function cycleWidgetSize(scope, id) {
      const current = getWidgetSize(scope, id);
      const next = sizeOrder[(sizeOrder.indexOf(current) + 1) % sizeOrder.length];
      setWidgetSize(scope, id, next);
    }

    function isTopWidgetAvailable(id) {
      return id !== 'sheet-layout' || activeView === 'sheet';
    }

    function defaultTopLayout() {
      return topWidgets.map(([id]) => id);
    }

    function cleanTopLayout(layout) {
      const known = new Set(topWidgets.map(([id]) => id));
      const result = [];
      arr(layout).forEach((id) => {
        const key = text(id).trim();
        if (known.has(key) && !result.includes(key)) result.push(key);
      });
      if (!result.includes('page-layout')) result.unshift('page-layout');
      return result;
    }

    function getTopLayout() {
      try {
        const saved = localStorage.getItem(topLayoutKey);
        if (saved) return cleanTopLayout(JSON.parse(saved));
      } catch {}
      return defaultTopLayout();
    }

    function setTopLayout(layout) {
      setJsonStorage(topLayoutKey, cleanTopLayout(layout));
      render();
    }

    function resetTopLayout() {
      localStorage.removeItem(topLayoutKey);
      localStorage.removeItem(topSizeKey);
      persistUiPreferences();
      render();
    }

    function addTopWidget(id) {
      const layout = getTopLayout();
      if (!id || layout.includes(id)) return;
      setTopLayout([...layout, id]);
    }

    function removeTopWidget(id) {
      if (id === 'page-layout') return;
      setTopLayout(getTopLayout().filter((item) => item !== id));
    }

    function moveTopWidget(id, direction) {
      const layout = getTopLayout();
      const index = layout.indexOf(id);
      if (index < 0) return;
      const next = ['up', 'left'].includes(direction) ? index - 1 : index + 1;
      if (next < 0 || next >= layout.length) return;
      [layout[index], layout[next]] = [layout[next], layout[index]];
      setTopLayout(layout);
    }

    function dropTopWidget(source, target) {
      if (!source || !target || source === target) return;
      const layout = getTopLayout().filter((id) => id !== source);
      const targetIndex = layout.indexOf(target);
      if (targetIndex < 0) return;
      layout.splice(targetIndex, 0, source);
      setTopLayout(layout);
    }

    function renderTopLayoutControls(layout) {
      const hidden = topWidgets.filter(([id]) => id !== 'page-layout' && !layout.includes(id) && isTopWidgetAvailable(id));
      return `
        <div class="layout-controls">
          <select id="topWidgetAdd" ${hidden.length ? '' : 'disabled'}>
            ${hidden.map(([id, label]) => `<option value="${id}">${label}</option>`).join('') || '<option value="">All sections shown</option>'}
          </select>
          <button type="button" data-top-widget-add ${hidden.length ? '' : 'disabled'}>Add Section</button>
          <button type="button" data-top-widget-reset>Reset</button>
        </div>
      `;
    }

    function statusWidgetBody(id) {
      const c = currentCharacter();
      const book = bookByNumber(c.BookNumber);
      const values = {
        'status-book': [`${c.BookNumber}. ${book.title}`, ''],
        'status-section': [app.state.CurrentSection, ''],
        'status-end': [`${c.EnduranceCurrent}/${c.EnduranceMax}`, ''],
        'status-gold': [currentInventory().GoldCrowns ?? currentInventory().Nobles ?? 0, ''],
        'status-cs': [c.CombatSkillCurrent, '']
      };
      const [value, subvalue] = values[id] || ['', ''];
      return `
        <div class="status-value">${escapeHtml(value)}</div>
        ${subvalue ? `<div class="status-subvalue">${escapeHtml(subvalue)}</div>` : ''}
      `;
    }

    function quickSectionBody() {
      const automation = app.state.Automation || {};
      const ending = automation.Ending;
      const flags = automation.Flags || {};
      const backpackUnavailable = flags.backpackAvailable === false || flags.backpackItemsAvailable === false;
      const weaponsUnavailable = flags.weaponsAvailable === false;
      const flow = currentFlow();
      const rollLabel = flow.Entry?.roll || flow.Entry?.stagedRoll ? 'Section Roll' : 'Roll 0-9';
      const missingBookFiles = !currentBookFilesInstalled();
      return `
        <div class="controls">
          <button type="button" data-automation-apply ${manualDisabledAttributes('section effects')} title="${isManualMode() ? 'Manual mode: click for section effect advice. No sheet changes will be applied.' : 'Apply audited section effects.'}">Apply Effects</button>
          <button type="button" data-roll ${manualDisabledAttributes('roll helper')} title="${isManualMode() ? 'Manual mode: click for roll advice. No roll will be recorded.' : 'Roll a random number from 0 to 9.'}">${rollLabel}</button>
        </div>
        <div class="quick-note">${ending ? `Ending marked: ${escapeHtml(ending.Type)}` : `Book ${escapeHtml(currentCharacter().BookNumber)}, section ${escapeHtml(app.state.CurrentSection)}`}</div>
        ${missingBookFiles ? '<div class="mode-note">Book HTML files are not installed. Open the Install Project Aon Books page from Home.</div>' : ''}
        ${isManualMode() ? '<div class="mode-note">Manual mode is tracking your sheet only. Click section helpers for advice, then apply the math by hand.</div>' : ''}
        ${weaponsUnavailable || backpackUnavailable ? `<div class="quick-note">Stored gear is being held until the book returns it.</div>` : ''}
      `;
    }

    function quickVitalsBody() {
      return `
        ${statButtons('end', 'END', true)}
        ${statButtons('gold', 'Gold', true)}
      `;
    }

    function quickAddBody() {
      return `
        <form id="quickItemForm" class="controls">
          <select name="type"><option value="weapon">Weapon</option><option value="backpack">Backpack</option><option value="special">Special</option></select>
          <input name="item" placeholder="Item name">
          <button type="submit">Add</button>
        </form>
        <div class="controls" style="margin-top:.35rem">
          <button data-meal="eat">Eat Meal</button>
          <button data-meal="missed">Missed Meal</button>
        </div>
      `;
    }

    function quickDropBody() {
      const inv = currentInventory();
      return `<div class="quick-drop-list">${quickDropRows(inv)}</div>`;
    }

    function tabsBody() {
      return `
        <div class="controls">
          ${views.map(([id, label]) => `<button type="button" class="${id === activeView ? 'active' : ''}" data-view="${id}">${label}</button>`).join('')}
        </div>
      `;
    }

    function renderTopWidget(id, layout) {
      if (!isTopWidgetAvailable(id)) return '';
      if (id === 'page-layout') {
        return dashboardPanel('page-layout', 'Page Layout', renderTopLayoutControls(layout), ['extra-wide'], 'top', false);
      }
      if (id.startsWith('status-')) {
        return dashboardPanel(id, topWidgetLabel(id), statusWidgetBody(id), ['top-status'], 'top');
      }
      if (id === 'quick-section') return dashboardPanel(id, 'Section Actions', quickSectionBody(), ['wide'], 'top');
      if (id === 'quick-vitals') return dashboardPanel(id, 'Vitals', quickVitalsBody(), ['wide'], 'top');
      if (id === 'quick-add') return dashboardPanel(id, 'Add Item', quickAddBody(), ['wide'], 'top');
      if (id === 'quick-drop') return dashboardPanel(id, 'Drop Item', quickDropBody(), ['wide'], 'top');
      if (id === 'tabs') return dashboardPanel(id, 'Tabs', tabsBody(), ['extra-wide'], 'top');
      if (id === 'sheet-layout') return dashboardPanel(id, 'Sheet Layout', renderSheetLayoutControls(getSheetLayout()), ['extra-wide'], 'top');
      return '';
    }

    function renderTopDashboard() {
      const layout = getTopLayout();
      topDashboard.innerHTML = layout.map((id) => renderTopWidget(id, layout)).join('');
    }

    function sheetWidgetLabel(id) {
      const widget = sheetWidgets.find(([key]) => key === id);
      return widget ? widget[1] : id;
    }

    function hasSavedCharacter() {
      return Boolean(text(app?.state?.Settings?.SavePath).trim());
    }

    function defaultSheetLayout() {
      return hasSavedCharacter() ? ['action', 'choices'] : ['action', 'new', 'choices'];
    }

    function cleanSheetLayout(layout) {
      const known = new Set(sheetWidgets.map(([id]) => id));
      const result = [];
      arr(layout).forEach((id) => {
        const key = text(id).trim();
        if (known.has(key) && !result.includes(key)) result.push(key);
      });
      return result;
    }

    function getSheetLayout() {
      try {
        const saved = localStorage.getItem(sheetLayoutKey);
        if (saved) return cleanSheetLayout(JSON.parse(saved));
      } catch {}
      return defaultSheetLayout();
    }

    function setSheetLayout(layout) {
      setJsonStorage(sheetLayoutKey, cleanSheetLayout(layout));
      render();
    }

    function resetSheetLayout() {
      localStorage.removeItem(sheetLayoutKey);
      localStorage.removeItem(sheetSizeKey);
      persistUiPreferences();
      render();
    }

    function addSheetWidget(id) {
      const layout = getSheetLayout();
      if (!id || layout.includes(id)) return;
      setSheetLayout([...layout, id]);
    }

    function removeSheetWidget(id) {
      setSheetLayout(getSheetLayout().filter((item) => item !== id));
    }

    function moveSheetWidget(id, direction) {
      const layout = getSheetLayout();
      const index = layout.indexOf(id);
      if (index < 0) return;
      const next = ['up', 'left'].includes(direction) ? index - 1 : index + 1;
      if (next < 0 || next >= layout.length) return;
      [layout[index], layout[next]] = [layout[next], layout[index]];
      setSheetLayout(layout);
    }

    function dropSheetWidget(source, target) {
      if (!source || !target || source === target) return;
      const layout = getSheetLayout().filter((id) => id !== source);
      const targetIndex = layout.indexOf(target);
      if (targetIndex < 0) return;
      layout.splice(targetIndex, 0, source);
      setSheetLayout(layout);
    }

    function renderSheetLayoutControls(layout) {
      const hidden = sheetWidgets.filter(([id]) => !layout.includes(id));
      return `
        <div class="layout-controls">
          <select id="sheetWidgetAdd" ${hidden.length ? '' : 'disabled'}>
            ${hidden.map(([id, label]) => `<option value="${id}">${label}</option>`).join('') || '<option value="">All sections shown</option>'}
          </select>
          <button type="button" data-widget-add ${hidden.length ? '' : 'disabled'}>Add Section</button>
          <button type="button" data-widget-reset>Reset</button>
        </div>
      `;
    }

    function dashboardPanel(id, title, body, classes = [], scope = 'sheet', removable = true) {
      const size = getWidgetSize(scope, id);
      const className = ['panel', 'dashboard-card', `size-${size}`].concat(classes).filter(Boolean).join(' ');
      const safeScope = escapeHtml(scope);
      const safeId = escapeHtml(id);
      return `
        <section class="${className}" data-widget="${safeId}" data-layout-scope="${safeScope}" draggable="true">
          <div class="panel-title-row">
            <h2>${escapeHtml(title)}</h2>
            <div class="panel-tools">
              <button type="button" data-widget-move="${safeScope}:${safeId}:left">Left</button>
              <button type="button" data-widget-move="${safeScope}:${safeId}:right">Right</button>
              <button type="button" data-widget-size="${safeScope}:${safeId}">${escapeHtml(sizeLabels[size])}</button>
              ${removable ? `<button type="button" class="danger" data-widget-remove="${safeScope}:${safeId}">Remove</button>` : ''}
            </div>
          </div>
          ${body}
        </section>
      `;
    }

    function choiceGroup(title, rows) {
      if (!rows) return '';
      return `
        <div class="choice-group">
          <div class="choice-title">${escapeHtml(title)}</div>
          ${rows}
        </div>
      `;
    }

    function sectionLootRows(entry) {
      return arr(entry.loot).map((loot) => `
        <div class="item-row">
          <small>Loot</small>
          <span class="wrap">${escapeHtml(text(loot.label || loot.id, 'Option'))}</span>
          ${modeActionButton(`data-flow-loot="${escapeHtml(text(loot.id))}"`, 'Apply', 'section loot')}
        </div>
      `).join('');
    }

    function sectionCombatRows(entry) {
      return arr(entry.combat).map((combat) => `
        <div class="item-row">
          <small>CS ${escapeHtml(text(combat.enemy?.cs || combat.enemies?.[0]?.cs, '?'))}</small>
          <span class="wrap">${escapeHtml(text(combat.label || combat.enemy?.name || combat.enemies?.[0]?.name, 'Section combat'))}</span>
          ${modeActionButton(`data-section-combat-start="${escapeHtml(text(combat.id))}"`, 'Start', 'combat presets')}
        </div>
      `).join('');
    }

    function sectionCostRows(entry) {
      return '';
    }

    function sectionRollRows(entry) {
      const flow = currentFlow();
      const lastRoll = flow.LastRoll;
      const roll = entry.roll || entry.stagedRoll;
      const stagedSummary = stagedRollSummary(entry, flow.StagedRoll);
      if (!roll && !lastRoll) return '';
      return `
        <div class="controls" style="margin-bottom:.35rem">
          <input id="manualRoll" type="number" min="0" max="9" placeholder="Optional roll">
          ${modeActionButton('data-roll', 'Roll', 'roll helper')}
        </div>
        ${roll ? `<p class="muted">${escapeHtml(stagedSummary || text(roll.summary, 'Section-aware roll'))}</p>` : ''}
        ${lastRoll ? `
          <div class="item-row">
            <small>${escapeHtml(lastRoll.Raw)}</small>
            <span class="wrap">Total ${escapeHtml(lastRoll.Total)}${lastRoll.StageLabel ? ` | ${escapeHtml(lastRoll.StageLabel)}` : ''}${lastRoll.Outcome ? ` | ${escapeHtml(lastRoll.Outcome)}` : ''}</span>
            ${lastRoll.Route ? `<button type="button" data-route="${escapeHtml(lastRoll.Route)}">Go ${escapeHtml(lastRoll.Route)}</button>` : ''}
          </div>
        ` : ''}
      `;
    }

    function sectionCartwheelRows() {
      const game = currentFlow().Cartwheel || {};
      if (!game.Available) return '';
      const maxStake = Math.max(0, Number(game.MaxStake || 0));
      const defaultStake = maxStake > 0 ? 1 : 0;
      const last = game.LastResult || null;
      return `
        <div class="cartwheel-game" data-cartwheel-game>
          <p class="muted">${escapeHtml(text(game.Summary, 'Pick a number, stake Gold Crowns, and roll 0-9.'))}</p>
          <div class="cartwheel-fields">
            <label>Bet
              <input data-cartwheel-bet type="number" min="0" max="9" value="0">
            </label>
            <label>Stake
              <input data-cartwheel-stake type="number" min="1" max="${escapeHtml(maxStake || 1)}" value="${escapeHtml(defaultStake)}">
            </label>
            <label>Roll
              <input data-cartwheel-roll type="number" min="0" max="9" placeholder="auto">
            </label>
          </div>
          <label class="cartwheel-token">
            <input data-cartwheel-token type="checkbox" ${game.FreeTokenAvailable ? 'checked' : 'disabled'}>
            <span>${game.FreeTokenAvailable ? `Use free silver token (+${escapeHtml(game.FreeTokenValue)})` : 'Free silver token spent'}</span>
          </label>
          <div class="controls">
            ${maxStake > 0 ? modeActionButton('data-cartwheel-play', 'Play Cartwheel', 'cartwheel') : '<button type="button" disabled>Play Cartwheel</button>'}

          ${last ? `
            <div class="item-row">

      const canPlay = Boolean(game.CanPlay);
      const pairText = (pair) => pair ? `${text(pair.Die1, '?')}+${text(pair.Die2, '?')}=${text(pair.Total, '?')}` : '?';
      return `
        <div class="cartwheel-game" data-portholes-game>
          <p class="muted">${escapeHtml(text(game.Summary, 'Roll two 0-9 dice for each player.'))}</p>
          <div class="cartwheel-fields">
            <label>P1 Die 1
              <input data-portholes-p1a type="number" min="0" max="9" placeholder="auto">
            </label>
            <label>P1 Die 2
              <input data-portholes-p1b type="number" min="0" max="9" placeholder="auto">
            </label>
            <label>P2 Die 1
              <input data-portholes-p2a type="number" min="0" max="9" placeholder="auto">
            </label>
            <label>P2 Die 2
              <input data-portholes-p2b type="number" min="0" max="9" placeholder="auto">
            </label>
            <label>LW Die 1
              <input data-portholes-lwa type="number" min="0" max="9" placeholder="auto">
            </label>

            <div class="item-row">

              <span class="wrap">${escapeHtml(text(last.Outcome, 'Result'))}: P1 ${escapeHtml(pairText(last.Player1))}, P2 ${escapeHtml(pairText(last.Player2))}, Lone Wolf ${escapeHtml(pairText(last.LoneWolf))}</span>

          ` : ''}
        </div>
      `;
    }

    function sectionGoldDistractionRows() {
      const game = currentFlow().GoldDistraction || {};
      if (!game.Available) return '';
      const maxThrow = Math.max(0, Number(game.MaxThrow || 0));
      const defaultThrow = maxThrow > 0 ? 1 : 0;
      const last = game.LastResult || null;
      return `
        <div class="cartwheel-game" data-gold-distraction-game>
          <p class="muted">${escapeHtml(text(game.Summary, 'Throw Gold Crowns, then roll 0-9.'))}</p>
          <div class="cartwheel-fields">
            <label>Gold
              <input data-gold-distraction-amount type="number" min="1" max="${escapeHtml(maxThrow || 1)}" value="${escapeHtml(defaultThrow)}">
            </label>
            <label>Roll
              <input data-gold-distraction-roll type="number" min="0" max="9" placeholder="auto">
            </label>
          </div>
          <div class="controls">
            ${maxThrow > 0 ? modeActionButton('data-gold-distraction-play', 'Throw Gold', 'gold distraction') : '<button type="button" disabled>No Gold Crowns</button>'}
            <span class="muted">0 counts as 10</span>
          </div>
          ${last ? `
            <div class="item-row">
              <small>${escapeHtml(last.Raw)}</small>
              <span class="wrap">Total ${escapeHtml(last.Total)} | ${escapeHtml(text(last.Outcome, 'Result'))} | ${escapeHtml(last.Thrown)} Gold</span>
              ${last.Route ? `<button type="button" data-route="${escapeHtml(last.Route)}">Go ${escapeHtml(last.Route)}</button>` : ''}
            </div>
          ` : ''}
        </div>
      `;
    }

    function routeCheckOutcomeText(outcome) {
      const label = text(outcome.Label, 'Result');
      const test = text(outcome.Test);
      const route = outcome.Route ? ` -> section ${outcome.Route}` : '';
      return `${test ? `${test}: ` : ''}${label}${route}`;

        choiceGroup('Portholes', sectionPortholesRows()),
        choiceGroup('Gold Distraction', sectionGoldDistractionRows()),
        choiceGroup('Loot And Section Items', sectionLootRows(entry)),
        choiceGroup('Section Combat', sectionCombatRows(entry)),
        choiceGroup('Section Roll', sectionRollRows(entry))
      ].filter(Boolean);
      return groups.join('') || '<p class="muted">No section choices recorded for this section.</p>';

    function newCharacterBody() {
      const defaultDisciplines = new Set(kaiDisciplines.slice(0, 5));
      const disciplineChoices = kaiDisciplines.map((name) => `
        <label class="check-option">

          </div>
          <button type="submit">Create</button>

    function adjustNewCharacterDisciplines(form) {
      const help = form?.querySelector('[data-discipline-help]');
      if (help) help.textContent = 'Kai Disciplines - choose 5';
      const bookNumber = Number(form?.querySelector('[data-new-book]')?.value || 1);
      form?.querySelectorAll('[data-book-setup]').forEach((item) => {
        item.hidden = ![2, 3, 4, 5].includes(bookNumber);
      });
      const equipmentHelp = form?.querySelector('[data-equipment-help]');
      if (equipmentHelp) equipmentHelp.textContent = equipmentLabelForBook(bookNumber);
      const equipmentGrid = form?.querySelector('[data-equipment-grid]');
      if (equipmentGrid) equipmentGrid.innerHTML = equipmentChoiceGrid(bookNumber);
      const boxes = Array.from(form?.querySelectorAll('input[name="kaiDisciplines"]') || []);
      const checked = boxes.filter((box) => box.checked);
      if (checked.length <= 5) return;
      checked.slice(5).forEach((box) => { box.checked = false; });
    }

    function renderSheetWidget(id, layout) {
      if (id === 'action') {
        return dashboardPanel('action', 'Action Chart', actionChartBody(), ['wide']);

      if (id === 'choices') {
        const classes = ['sheet-choices'];
        if (!layout.includes('new')) classes.push('wide');
        return dashboardPanel('choices', 'Choices', choicesPanelBody(), classes);
      }
      if (id === 'new') {
        return dashboardPanel('new', 'New Character', newCharacterBody());
      }
      if (id === 'stored') {
        return dashboardPanel('stored', 'Stored Gear', storedGearBody(true));
      }
      return '';
    }

      view.innerHTML = `
        ${renderSectionAssist()}
        <div class="panel">
          <h2>Current Section</h2>
          <form id="sectionForm" class="controls">
            <select name="book">${books.map((b) => `<option value="${b.number}" ${Number(c.BookNumber) === b.number ? 'selected' : ''}>${b.number}. ${b.title}</option>`).join('')}</select>

          </form>
        </div>
        <div class="panel">
          <h2>Recent Path</h2>
          ${history.map((item) => `<div class="item-row"><small>Book ${item.BookNumber}</small><span>${item.BookTitle} - Section ${item.Section}</span><button data-section-jump="${item.BookNumber}:${item.Section}">Open</button></div>`).join('') || '<div class="item-row"><span>No path yet.</span></div>'}
        </div>
      `;
    }

    function renderSectionAssist() {
      const flow = currentFlow();
      const entry = flow.Entry || {};
      const lastRoll = flow.LastRoll;
      const sectionRoll = entry.roll || entry.stagedRoll;
      const stagedSummary = stagedRollSummary(entry, flow.StagedRoll);
      const sourceRoutes = arr(flow.SourceRoutes);
      const automation = flow.Automation || {};
      const healing = flow.Healing || {};
      const automationMessages = arr(automation.Messages);
      const routeRows = sourceRoutes.map((route) => (
        `<button type="button" data-route="${escapeHtml(route.Section)}">${escapeHtml(routeLabel(route))}</button>`
      )).join('');
      const automationRows = automation.Summary ? `
        <div class="item-row">
          <small>${automation.Applied ? 'Applied' : 'Ready'}</small>
          <span class="wrap">${escapeHtml(automation.Summary)}</span>
        </div>
        ${automationMessages.map((line) => `
          <div class="item-row">
            <small>Result</small>
            <span class="wrap">${escapeHtml(line)}</span>
          </div>
        `).join('')}
      ` : '<p class="muted">No automatic entry effect for this section.</p>';
      const rollRows = lastRoll ? `
        <div class="item-row">
          <small>${escapeHtml(lastRoll.Raw)}</small>
          <span>Total ${escapeHtml(lastRoll.Total)}${lastRoll.StageLabel ? ` | ${escapeHtml(lastRoll.StageLabel)}` : ''}${lastRoll.Outcome ? ` | ${escapeHtml(lastRoll.Outcome)}` : ''}</span>
          ${lastRoll.Route ? `<button type="button" data-route="${escapeHtml(lastRoll.Route)}">Go ${escapeHtml(lastRoll.Route)}</button>` : ''}
        </div>
        ${arr(lastRoll.ActionMessages).map((line) => `
          <div class="item-row">
            <small>Effect</small>
            <span class="wrap">${escapeHtml(line)}</span>
          </div>
        `).join('')}
      ` : '<p class="muted">No roll recorded for this section yet.</p>';
      const combatRows = arr(entry.combat).map((combat) => `
        <div class="item-row">
          <small>CS ${escapeHtml(text(combat.enemy?.cs || combat.enemies?.[0]?.cs, '?'))}</small>
          <span>${escapeHtml(text(combat.label || combat.enemy?.name || combat.enemies?.[0]?.name, 'Section combat'))}</span>
          ${modeActionButton(`data-section-combat-start="${escapeHtml(text(combat.id))}"`, 'Start', 'combat presets')}
        </div>
      `).join('');
      const lootRows = arr(entry.loot).map((loot) => `
        <div class="item-row">
          <small>Loot</small>
          <span>${escapeHtml(text(loot.label || loot.id, 'Option'))}</span>
          ${modeActionButton(`data-flow-loot="${escapeHtml(text(loot.id))}"`, 'Apply', 'section loot')}
        </div>
      `).join('');
      const healingRows = healing.Available ? `
        <div class="item-row">
          <small>${healing.Applied ? 'Applied' : (healing.Ready ? 'Ready' : 'Wait')}</small>
          <span class="wrap">${escapeHtml(healing.Ready ? text(healing.Summary, 'Kai Healing') : text(healing.BlockedReason, 'Healing not available'))}</span>
          ${healing.Ready ? modeActionButton('data-healing', 'Apply', 'healing') : ''}
        </div>
      ` : '';
      const lossRows = arr(flow.LossChoices).map((choice) => {
        const replacement = choice.Replacement || null;
        const actionLabel = replacement ? 'Exchange' : 'Remove';
        const candidateRows = arr(choice.Candidates).map((candidate) => `
          <div class="item-row">
            <small>${escapeHtml(candidate.Type === 'weapon' ? 'W' : 'B')}${escapeHtml(candidate.Slot)}</small>
            <span>${escapeHtml(candidate.Item)}</span>
            ${choice.Ready ? modeActionButton(`data-section-loss="${escapeHtml(choice.Id)}:${escapeHtml(candidate.Type)}:${escapeHtml(candidate.Slot)}"`, actionLabel, 'section loss') : ''}
          </div>
        `).join('');
        return `
          <div class="item-row">
            <small>${choice.Applied ? 'Applied' : (choice.Ready ? 'Choose' : 'Wait')}</small>
            <span class="wrap">${escapeHtml(text(choice.Label, 'Loss choice'))}: ${escapeHtml(text(choice.Summary || choice.BlockedReason, 'Choose an item to lose'))}</span>
          </div>
          ${candidateRows || `<p class="muted">${escapeHtml(text(choice.BlockedReason, 'No eligible carried item.'))}</p>`}
        `;
      }).join('');
      const statusRows = arr(entry.status).map((status) => {
        const current = app.state.Automation?.Flags?.[status.key] === true;
        return `
          <div class="item-row">
            <small>${current ? 'On' : 'Off'}</small>
            <span>${escapeHtml(text(status.label || status.key, 'Status'))}</span>
            <button type="button" data-status-flag="${escapeHtml(status.key)}:${current ? 'false' : 'true'}">${current ? 'Clear' : 'Set'}</button>
          </div>
        `;
      }).join('');
      const wpPanel = '';
      return `
        <div class="panel">
          <h2>Section Assistant</h2>
          <div class="section-subtitle">Automatic Entry Effect</div>
          ${automationRows}
          <div class="controls">
            <input id="manualRoll" type="number" min="0" max="9" placeholder="Optional roll">
            ${modeActionButton('data-roll', 'Roll', 'roll helper')}
          </div>
          ${sectionRoll ? `<p class="muted">${escapeHtml(stagedSummary || text(sectionRoll.summary, 'Section-aware roll'))}</p>` : '<p class="muted">Generic random digit unless this section has a special random rule.</p>'}
          ${rollRows}
          <div class="controls">${routeRows || '<span class="muted">No source routes found.</span>'}</div>
        </div>
        ${combatRows ? `<div class="panel"><h2>Section Combat</h2>${combatRows}</div>` : ''}
        ${lootRows ? `<div class="panel"><h2>Loot And Section Items</h2>${lootRows}</div>` : ''}
        ${healingRows ? `<div class="panel"><h2>Kai Healing</h2>${healingRows}</div>` : ''}
        ${lossRows ? `<div class="panel"><h2>Choose Inventory Change</h2>${lossRows}</div>` : ''}
        ${statusRows ? `<div class="panel"><h2>Status Flags</h2>${statusRows}</div>` : ''}
        ${wpPanel}
      `;
    }

      const combat = currentCombat();
      const c = currentCharacter();
      const active = Boolean(combat.Active);
      const rounds = arr(combat.Log).slice(-8);
      const history = arr(app.state.CombatHistory).slice(-5).reverse();

        ['Lone Wolf CS', text(combat.PlayerCombatSkill ?? c.CombatSkillCurrent, '0')],

        ['Combat Ratio', ratio],
        ['Lone Wolf END', playerEnd],
        ['Enemy END', enemyEnd],
        ['Weapon', text(combat.ActiveWeapon, 'Unarmed')],

          ` : `

              <label class="field">Enemy<input name="name" value="Enemy"></label>

              <label class="field">Active Weapon<select name="activeWeapon">${combatWeaponOptions(combat)}</select></label>
              <label class="field" title="Optional. If the book says you can evade only after a certain number of rounds, put that number here.">Evade After Rounds<input name="evadeAfterRounds" type="number" min="0" value="0" title="Minimum combat rounds before the Evade button should be used."></label>
              <label class="field" title="Optional. Use this when the book says where to turn after winning this fight. The assistant can offer that section after victory.">Victory Section<input name="victoryRoute" type="number" min="1" placeholder="Optional" title="Section number to use after winning, if the book gives one."></label>
              <label class="field" title="Optional. Use this when the book gives a section for evading the fight. The assistant can use this target when you press Evade.">Evade Section<input name="evadeRoute" type="number" min="1" placeholder="Optional" title="Section number to use after evading, if the book gives one."></label>
              <label class="field" title="Set this to Yes only when the section explicitly allows evasion."><span>Can Evade</span><select name="canEvade" title="Controls whether the Evade button is available for this fight."><option value="">No</option><option value="true">Yes</option></select></label>
              <button type="submit">Start Combat</button>
            </form>
          `}
        </div>
        ${active ? renderCombatDuelMeters(combat) : ''}

          <h2>Combat</h2>
          <div class="grid">${rows.map(([label, value]) => field(label, escapeHtml(value))).join('')}</div>
        </div>
        <div class="panel">
          <h2>Recent Combat Rounds</h2>
          ${rounds.length ? rounds.map((round) => `

    function renderNotes() {

    function text(value, fallback = '') {
      if (value === null || value === undefined || value === '') return fallback;
      return String(value);
    }
    function escapeHtml(value) {
      return text(value).replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      })[char]);
    }
    function numberValue(value, fallback = 0) {
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    }
    function formatSigned(value) {
      const number = numberValue(value, 0);
      return number > 0 ? `+${number}` : String(number);
    }
    function meterPercent(current, max) {
      const safeMax = Math.max(0, numberValue(max, 0));
      if (safeMax <= 0) return 0;
      const clamped = Math.max(0, Math.min(numberValue(current, 0), safeMax));
      return Math.max(0, Math.min(100, (clamped / safeMax) * 100));
    }
    function meterTone(current, max) {
      const percent = meterPercent(current, max);
      if (percent <= 25) return 'meter-danger';
      if (percent <= 50) return 'meter-warning';
      return 'meter-good';
    }
    function combatMeterCard({ label, current, max, combatSkill, enduranceLabel = 'END', note = '' }) {
      const currentValue = numberValue(current, 0);
      const maxValue = numberValue(max, 0);
      const percent = meterPercent(currentValue, maxValue);
      const tone = meterTone(currentValue, maxValue);
      return `
        <article class="combat-meter-card">
          <div class="combat-meter-header">
            <h3>${escapeHtml(label)}</h3>
            <span class="combat-meter-cs">CS ${escapeHtml(text(combatSkill, '0'))}</span>
          </div>
          <div class="combat-meter-meta">
            <span>${escapeHtml(enduranceLabel)}</span>
            <strong>${escapeHtml(currentValue)} / ${escapeHtml(maxValue)}</strong>
          </div>
          <div class="combat-meter-track" role="meter" aria-label="${escapeHtml(label)} endurance" aria-valuemin="0" aria-valuemax="${escapeHtml(Math.max(1, maxValue))}" aria-valuenow="${escapeHtml(Math.max(0, Math.min(currentValue, maxValue)))}">
            <div class="combat-meter-fill ${tone}" style="width: ${percent.toFixed(2)}%"></div>
          </div>
          ${note ? `<div class="combat-meter-note">${escapeHtml(note)}</div>` : ''}
        </article>
      `;
    }
    function renderCombatDuelMeters(combat) {
      const c = currentCharacter();
      const ratio = combat.CombatRatio === null || combat.CombatRatio === undefined ? '?' : formatSigned(combat.CombatRatio);
      const notes = arr(combat.CombatNotes).map((note) => text(note).trim()).filter(Boolean);
      return `
        <div class="panel combat-meter-panel">
          <div class="combat-meter-title-row">
            <h2>Life Meters</h2>
            <div class="combat-meter-ratio"><span>Combat Ratio</span><strong>${escapeHtml(ratio)}</strong></div>
          </div>
          <div class="combat-meter-grid">
            ${combatMeterCard({
              label: 'Lone Wolf',
              current: combat.PlayerEnduranceCurrent ?? c.EnduranceCurrent,
              max: combat.PlayerEnduranceMax ?? c.EnduranceMax,
              combatSkill: combat.PlayerCombatSkill ?? c.CombatSkillCurrent,
              enduranceLabel: combat.PlayerEnduranceLabel || 'END'
            })}
            ${combatMeterCard({
              label: text(combat.EnemyName, 'Enemy'),
              current: combat.EnemyEnduranceCurrent,
              max: combat.EnemyEnduranceMax,
              combatSkill: combat.EnemyCombatSkillEffective ?? combat.EnemyCombatSkill
            })}
          </div>
          ${notes.length ? `<div class="combat-meter-notes">${notes.map((note) => `<span>${escapeHtml(note)}</span>`).join('')}</div>` : ''}
        </div>
      `;
    }

    function field(label, value) {
      return `<div class="field"><span>${label}</span><div class="value">${value}</div></div>`;
    }
    function arr(value) { return Array.isArray(value) ? value : (value ? [value] : []); }
    function list(value) { const values = arr(value); return values.length ? values.join(', ') : 'None'; }
    function itemUseHelp(item) {
      const name = text(item).toLowerCase();
      if (name.includes('potion of healing') || name.includes('healing potion')) return 'Use: restore 4 Endurance.';
      if (name.includes('rendalim')) return 'Use: restore 6 Endurance.';
      if (name.includes('potion of invulnerability')) return 'Use: mark invulnerability protection active and return an Empty Vial.';
      if (name.includes('potion of alether')) return 'Use: add 2 Combat Skill.';
      if (name.includes('laumspur')) return 'Use: restore the Endurance amount recorded by this Laumspur item.';
      return '';
    }
    function canUseItem(item) {
      return Boolean(itemUseHelp(item));
    }
    function canEatItem(item) {
      return text(item).trim().toLowerCase() === 'meal';
    }
    function itemFlagToggle(item) {
      const name = text(item).toLowerCase();
      if (name.includes('yabari') && name.includes('ointment')) {
        const active = app.state.Automation?.Flags?.yabariOintmentApplied === true;
        return {
          key: 'yabariOintmentApplied',
          value: active ? 'false' : 'true',
          label: active ? 'Off' : 'Use'
        };
      }
      return null;
    }
    function itemActionButtons(type, item) {
      const encoded = encodeURIComponent(item);
      const toggle = itemFlagToggle(item);
      const useHelp = itemUseHelp(item);
      return [
        canEatItem(item) ? '<button data-meal="eat">Eat</button>' : '',
        useHelp ? `<button data-use-item="${type}:${encoded}" title="${escapeHtml(useHelp)}">Use</button>` : '',
        toggle ? `<button data-status-flag="${toggle.key}:${toggle.value}">${toggle.label}</button>` : ''
      ].join('');
    }
    function keyItemNote(item) {
      const name = text(item).toLowerCase();
      const notes = [
        ['crystal star pendant', 'Series item', 'Rare lore item and occasional later check.'],
        ['sommerswerd', 'Campaign weapon', 'Major carry-forward Special Item and combat weapon.'],
        ['magic spear', 'Special weapon', 'Weapon-like Special Item for specific Book 2 routes.'],
        ['shield', 'Carry-forward', 'Useful defensive Special Item across the Kai books.'],
        ['silver helm', 'Carry-forward', 'Important Kalte reward and Combat Skill helper.'],
        ['firesphere', 'Carry-forward', 'Important Kalte Special Item with later route value.'],
        ['onyx medallion', 'Route item', 'Important route item after the Ruanon investigation.'],
        ['dagger of vashna', 'Series item', 'Major Book 4 reward with later-series value.'],
        ['black sash', 'Local pass', 'Useful Barrakeesh disguise item.'],
        ['jewelled mace', 'Route item', 'Heavy Special Item with Book 5 route/combat value.'],
        ['book of the magnakai', 'Series item', 'Major campaign transition item.']
      ];
      const match = notes.find(([needle]) => name.includes(needle));
      if (!match) return '';
      return `<small class="item-note" title="${escapeHtml(match[2])}">${escapeHtml(match[1])}</small>`;
    }
    function statButtons(stat, label, compact = false) {
      const labelClass = compact ? 'quick-stat-label' : '';
      const labelStyle = compact ? '' : 'style="min-width:94px"';
      return `<div class="controls" style="margin-bottom:.45rem"><span class="${labelClass}" ${labelStyle}>${label}</span><button data-adjust="${stat}:-1">-1</button><button data-adjust="${stat}:1">+1</button><input data-set="${stat}" type="number" placeholder="Set"><button data-set-button="${stat}">Set</button></div>`;
    }
    function itemList(title, type, items) {
      const rows = arr(items).map((item, index) => `<div class="item-row"><small>${index + 1}</small><span>${escapeHtml(item)}</span>${keyItemNote(item)}${itemActionButtons(type, item)}<button class="danger" data-drop="${type}:${encodeURIComponent(item)}">Drop</button></div>`).join('');
      return `<div class="panel"><h2>${title}</h2>${rows || '<div class="item-row"><span>Empty</span></div>'}</div>`;
    }
    function quickDropRows(inv) {
      const groups = [
        ['W', 'weapon', inv.Weapons],
        ['B', 'backpack', inv.BackpackItems],
        ['S', 'special', inv.SpecialItems]
      ];
      const rows = groups.flatMap(([label, type, items]) => arr(items).map((item) => (
        `<div class="item-row"><small>${label}</small><span>${escapeHtml(item)}</span>${keyItemNote(item)}${itemActionButtons(type, item)}<button class="danger" data-drop="${type}:${encodeURIComponent(item)}">Drop</button></div>`
      )));
      return rows.join('') || '<div class="item-row"><span>Inventory empty.</span></div>';
    }
    function karmoControls(flags) {
      return '';
    }
    function storedEquipment() {
      const stored = app.state.Automation?.Stored || {};
      const equipment = stored.confiscatedEquipment && typeof stored.confiscatedEquipment === 'object'
        ? stored.confiscatedEquipment
        : {};
      return {
        Weapons: arr(equipment.Weapons),
        BackpackItems: arr(equipment.BackpackItems).length ? arr(equipment.BackpackItems) : arr(stored.confiscatedBackpackItems),
        SpecialItems: arr(equipment.SpecialItems),
        GoldCrowns: Number(equipment.GoldCrowns || 0),
        SafekeepingSpecialItems: arr(stored.safekeepingSpecialItems),
        SafekeepingRecords: arr(stored.safekeepingRecords).filter((item) => item && typeof item === 'object')
      };
    }
    function storedGearPanel() {
      const flags = app.state.Automation?.Flags || {};
      const gearUnavailable = flags.weaponsAvailable === false || flags.backpackAvailable === false || flags.backpackItemsAvailable === false || flags.specialItemsAvailable === false;
      const stored = storedEquipment();
      if (!gearUnavailable && !stored.Weapons.length && !stored.BackpackItems.length && !stored.SpecialItems.length && !stored.GoldCrowns && !stored.SafekeepingSpecialItems.length) return '';
      return `
        <div class="panel">
          <h2>Stored Gear</h2>
          ${storedGearBody(false)}
        </div>
      `;
    }
    function storedGearBody(showEmpty = true) {
      const flags = app.state.Automation?.Flags || {};
      const gearUnavailable = flags.weaponsAvailable === false || flags.backpackAvailable === false || flags.backpackItemsAvailable === false || flags.specialItemsAvailable === false;
      const stored = storedEquipment();
      const weaponRows = stored.Weapons.map((item) => `<div class="item-row"><small>W</small><span>${escapeHtml(item)}</span></div>`);
      const backpackRows = stored.BackpackItems.map((item, index) => `<div class="item-row"><small>${index + 1}</small><span>${escapeHtml(item)}</span></div>`);
      const specialRows = stored.SpecialItems.map((item) => `<div class="item-row"><small>S</small><span>${escapeHtml(item)}</span></div>`);
      const safekeepingRows = stored.SafekeepingSpecialItems.map((item) => {
        const record = stored.SafekeepingRecords.find((entry) => text(entry.Item).toLowerCase() === text(item).toLowerCase());
        const place = text(record?.Place, 'Safekeeping');
        return `<div class="item-row"><small>${escapeHtml(place)}</small><span>${escapeHtml(item)}</span></div>`;
      });
      const goldRow = stored.GoldCrowns ? `<div class="item-row"><small>Gold</small><span>${escapeHtml(stored.GoldCrowns)} Crown(s)</span></div>` : '';
      const rows = weaponRows.concat(backpackRows, specialRows, goldRow ? [goldRow] : [], safekeepingRows).join('');
      return `
        <p class="muted">${gearUnavailable ? 'Unavailable until the book restores your gear.' : 'Recovered gear and safekeeping record.'}</p>
        ${rows || (showEmpty ? '<div class="item-row"><span>No stored gear recorded.</span></div>' : '')}

    function powerPanel(title, all, known) {
      return `<div class="panel"><h2>${title}</h2>${all.map((name) => {
        const has = arr(known).includes(name);
        return `<div class="item-row"><span>${name}</span><small>${has ? 'Known' : 'Available'}</small></div>`;
      }).join('')}</div>`;
    }

    message.addEventListener('click', toggleReceipt);
    message.addEventListener('keydown', (event) => {
      if (event.key !== 'Enter' && event.key !== ' ') return;
      event.preventDefault();
      toggleReceipt();
    });

    document.addEventListener('pointerdown', (event) => {
      if (event.target.closest?.('.menu-popover, .app-menu-button, .card-menu-button')) return;
      closeMenus();
    });

    document.addEventListener('click', async (event) => {
      const button = event.target.closest('button');
      if (!button || !app) return;
      if (button.dataset.appMenuToggle !== undefined) {
        const wasHidden = appMenu.hidden;
        closeMenus();
        if (wasHidden) {
          renderAppMenu();
          appMenu.hidden = false;
        }
        return;
      }
      if (button.dataset.settingKind) {
        await updateAssistantSetting(button.dataset.settingKind, button.dataset.settingId);
        return;
      }
      if (button.dataset.slotSave) {
        await action({ action: 'save_slot', slot: Number(button.dataset.slotSave) });
        return;
      }
      if (button.dataset.slotLoad) {
        await action({ action: 'load_slot', slot: Number(button.dataset.slotLoad) });
        return;
      }
      if (button.dataset.slotClear) {
        if (window.confirm(`Clear save slot ${button.dataset.slotClear}?`)) {
          await action({ action: 'clear_slot', slot: Number(button.dataset.slotClear) });
        }
        return;
      }
      if (button.dataset.cardMenuToggle) {
        const [scope, id] = button.dataset.cardMenuToggle.split(':');
        toggleCardMenu(scope, id);
        return;
      }
      if (button.dataset.cardCollapse) {
        const [scope, id] = button.dataset.cardCollapse.split(':');
        toggleCardCollapsed(scope, id);
        return;
      }
      if (button.dataset.cardMove) {
        const [scope, id, direction] = button.dataset.cardMove.split(':');
        moveCard(scope, id, direction);
        return;
      }
      if (button.dataset.cardSize) {
        const [scope, id, size] = button.dataset.cardSize.split(':');
        setCardSize(scope, id, size);
        return;
      }
      if (button.dataset.cardClose) {
        const [scope, id] = button.dataset.cardClose.split(':');
        closeCard(scope, id);
        return;
      }
      if (button.dataset.cardOpen) {
        const [scope, id] = button.dataset.cardOpen.split(':');
        openCard(scope, id);
        return;
      }
      if (button.dataset.cardResetScope) {
        resetCardScope(button.dataset.cardResetScope);
        return;
      }
      if (button.dataset.cardResetAll !== undefined) {
        resetAllCardLayouts();
        return;
      }
      if (button.dataset.modeSet) {
        await setPlayMode(button.dataset.modeSet);
        return;
      }
      if (button.dataset.cliReconnect !== undefined) {
        stopCliTerminal();
        startCliTerminal();
        return;
      }
      if (button.dataset.settingsView !== undefined) {
        activeView = 'settings';
        closeMenus();
        render();
        return;
      }
      if (button.dataset.saveCurrent !== undefined) {
        closeMenus();
        await action({ action: 'save', path: '' });
        return;
      }
      if (button.dataset.exportSave !== undefined) {
        closeMenus();
        window.open('/api/export-save', '_blank');
        return;
      }
      if (button.dataset.backupSaves !== undefined) {
        closeMenus();
        window.open('/api/backup-saves', '_blank');
        return;
      }
      if (button.dataset.importSave !== undefined) {
        const file = document.getElementById('importSaveInput')?.files?.[0];
        if (!file) {
          setReceipt({
            summary: 'Save - Choose a save JSON file first',
            title: 'Save Import',
            details: [
              receiptDetail('Why', 'Import needs a selected Lone Wolf save JSON file.'),
              receiptDetail('How', 'Choose a file in the import control, then press Import Selected Save again.')
            ]
          });
          return;
        }
        const raw = await file.text();
        await action({ action: 'import_save', raw, save: true });
        return;
      }
      if (button.dataset.shutdownApp !== undefined) {
        closeMenus();
        if (window.confirm('Shut down the local Lone Wolf assistant server?')) {
          await action({ action: 'shutdown' });
          serverStatus.textContent = 'Shutting down';
        }
        return;
      }
      if (button.dataset.view) { activeView = button.dataset.view; render(); return; }
      if (button.dataset.topWidgetAdd !== undefined) {
        addTopWidget(document.getElementById('topWidgetAdd')?.value || '');
        return;
      }
      if (button.dataset.topWidgetReset !== undefined) {
        resetTopLayout();
        return;
      }
      if (button.dataset.widgetAdd !== undefined) {
        addSheetWidget(document.getElementById('sheetWidgetAdd')?.value || '');
        return;
      }
      if (button.dataset.widgetReset !== undefined) {
        resetSheetLayout();
        return;
      }
      if (button.dataset.widgetRemove) {
        const [scope, id] = button.dataset.widgetRemove.split(':');
        if (scope === 'top') removeTopWidget(id);
        else removeSheetWidget(id);
        return;
      }
      if (button.dataset.widgetMove) {
        const [scope, id, direction] = button.dataset.widgetMove.split(':');
        if (scope === 'top') moveTopWidget(id, direction);
        else moveSheetWidget(id, direction);
        return;
      }
      if (button.dataset.widgetSize) {
        const [scope, id] = button.dataset.widgetSize.split(':');
        cycleWidgetSize(scope, id);
        return;
      }
      if (isManualMode() && button.dataset.automationApply !== undefined) {
        manualSectionAdvice('section effects');
        return;
      }
      if (isManualMode() && button.dataset.roll !== undefined) {
        manualSectionAdvice('roll helpers');
        return;
      }
      if (isManualMode() && button.dataset.sectionCombatStart !== undefined) {
        activeView = 'combat';
        manualSectionAdvice('combat presets', { id: button.dataset.sectionCombatStart });
        render();
        return;
      }
      if (isManualMode() && button.dataset.flowLoot) {
        manualSectionAdvice('section loot', { id: button.dataset.flowLoot });
        return;
      }
      if (isManualMode() && button.dataset.cartwheelPlay !== undefined) {
        manualSectionAdvice('cartwheel');
        return;
      }
      if (isManualMode() && button.dataset.portholesPlay !== undefined) {
        manualSectionAdvice('portholes');
        return;
      }
      if (isManualMode() && button.dataset.goldDistractionPlay !== undefined) {
        manualSectionAdvice('gold distraction');
        return;
      }
      if (isManualMode() && button.dataset.healing !== undefined) {
        manualSectionAdvice('healing');
        return;
      }
      if (isManualMode() && button.dataset.sectionLoss) {
        const [id] = button.dataset.sectionLoss.split(':');
        manualSectionAdvice('section loss', { id });
        return;
      }
      if (isManualMode() && button.dataset.wpCost) {
        const [cost, mode] = button.dataset.wpCost.split(':');
        manualSectionAdvice('section costs', { cost: Number(cost), mode });
        return;
      }
      if (isManualMode() && button.dataset.combatAuto !== undefined) {
        manualSectionAdvice('combat auto-resolve');
        return;
      }
      if (button.dataset.deathRecovery) await action({ action: 'death_recovery', mode: button.dataset.deathRecovery });
      if (button.dataset.completeBook !== undefined) await action({ action: 'complete_book' });
      if (button.dataset.repeatBook !== undefined) await action({ action: 'repeat_book' });
      if (button.dataset.automationApply !== undefined) await action({ action: 'apply_automation' });
      if (button.dataset.roll !== undefined) {
        const input = document.getElementById('manualRoll');
        await action({ action: 'roll', raw: input?.value || '' });
      }
      if (button.dataset.route) await action({ action: 'route', section: Number(button.dataset.route) });
      if (button.dataset.sectionCombatStart !== undefined) {
        activeView = 'combat';
        await action({ action: 'section_combat_start', id: button.dataset.sectionCombatStart });
        return;
      }
      if (button.dataset.flowLoot) await action({ action: 'flow_loot', id: button.dataset.flowLoot });
      if (button.dataset.cartwheelPlay !== undefined) {
        const game = button.closest('[data-cartwheel-game]');
        await action({
          action: 'cartwheel',
          bet: Number(game?.querySelector('[data-cartwheel-bet]')?.value || 0),
          stake: Number(game?.querySelector('[data-cartwheel-stake]')?.value || 0),
          raw: game?.querySelector('[data-cartwheel-roll]')?.value || '',
          useToken: Boolean(game?.querySelector('[data-cartwheel-token]')?.checked)
        });
      }
      if (button.dataset.portholesPlay !== undefined) {
        const game = button.closest('[data-portholes-game]');
        await action({
          action: 'portholes',
          p1a: game?.querySelector('[data-portholes-p1a]')?.value || '',
          p1b: game?.querySelector('[data-portholes-p1b]')?.value || '',
          p2a: game?.querySelector('[data-portholes-p2a]')?.value || '',
          p2b: game?.querySelector('[data-portholes-p2b]')?.value || '',
          lwa: game?.querySelector('[data-portholes-lwa]')?.value || '',
          lwb: game?.querySelector('[data-portholes-lwb]')?.value || ''
        });
      }
      if (button.dataset.goldDistractionPlay !== undefined) {
        const game = button.closest('[data-gold-distraction-game]');
        await action({
          action: 'gold_distraction',
          amount: Number(game?.querySelector('[data-gold-distraction-amount]')?.value || 0),
          raw: game?.querySelector('[data-gold-distraction-roll]')?.value || ''
        });
      }
      if (button.dataset.healing !== undefined) await action({ action: 'healing' });
      if (button.dataset.sectionLoss) {
        const [id, type, slot] = button.dataset.sectionLoss.split(':');
        await action({ action: 'section_loss', id, type, slot });
      }
      if (button.dataset.statusFlag) {
        const [key, value] = button.dataset.statusFlag.split(':');
        await action({ action: 'status_flag', key, value });
      }
      if (button.dataset.wpCost) {
        const [cost, mode] = button.dataset.wpCost.split(':');
        await action({ action: 'wp_cost', cost: Number(cost), mode });
      }
      if (button.dataset.adjust) {
        const [stat, delta] = button.dataset.adjust.split(':');
        await action({ action: 'adjust', stat, value: Number(delta), mode: 'delta' });
      }
      if (button.dataset.setButton) {
        const input = button.closest('.controls')?.querySelector(`[data-set="${button.dataset.setButton}"]`) || document.querySelector(`[data-set="${button.dataset.setButton}"]`);
        await action({ action: 'adjust', stat: button.dataset.setButton, value: Number(input.value), mode: 'set' });
      }
      if (button.dataset.drop) {
        const [type, item] = button.dataset.drop.split(':');
        await action({ action: 'drop_item', type, item: decodeURIComponent(item) });
      }
      if (button.dataset.useItem) {
        const [type, item] = button.dataset.useItem.split(':');
        await action({ action: 'use_item', type, item: decodeURIComponent(item) });
      }
      if (button.dataset.karmoSideEffect !== undefined) await action({ action: 'karmo_side_effect' });
      if (button.dataset.karmoFinish !== undefined) await action({ action: 'karmo_finish' });
      if (button.dataset.meal) await action({ action: 'meal', missed: button.dataset.meal === 'missed' });
      if (button.dataset.weaponskillAssign !== undefined) {
        const input = button.closest('.panel')?.querySelector('[data-weaponskill-roll]');
        await action({ action: 'assign_weaponskill', roll: input?.value || '' });
      }
      if (button.dataset.sectionJump) {
        const [book, section] = button.dataset.sectionJump.split(':');
        await action({ action: 'set_position', book: Number(book), section: Number(section) });
      }
      if (button.dataset.load) await action({ action: 'load', path: button.dataset.load });
      if (button.dataset.autosave) {
        closeMenus();
        await action({ action: 'autosave' });
      }
      if (button.dataset.combatStop !== undefined) await action({ action: 'combat_stop' });
      if (button.dataset.combatAuto !== undefined) await action({ action: 'combat_auto' });
      if (button.dataset.combatEvade !== undefined) {
        const form = document.getElementById('roundForm');
        await action({ action: 'combat_evade', activeWeapon: form?.activeWeapon.value, roll: form?.roll.value });
      }
    });

    document.addEventListener('dragstart', (event) => {
      const header = event.target.closest?.('.panel-title-row');
      const card = header?.closest?.('.dashboard-card');
      if (!card) return;
      draggedWidget = `${card.dataset.layoutScope || 'sheet'}:${card.dataset.widget || ''}`;
      card.classList.add('is-dragging');
      event.dataTransfer.effectAllowed = 'move';
      event.dataTransfer.setData('text/plain', draggedWidget);
    });

    document.addEventListener('dragover', (event) => {
      const card = event.target.closest?.('.dashboard-card');
      if (!card || !draggedWidget) return;
      const [sourceScope, sourceId] = draggedWidget.split(':');
      if ((card.dataset.layoutScope || 'sheet') !== sourceScope || card.dataset.widget === sourceId) return;
      event.preventDefault();
      document.querySelectorAll('.dashboard-card.drag-over').forEach((item) => item.classList.remove('drag-over'));
      card.classList.add('drag-over');
    });

    document.addEventListener('drop', (event) => {
      const card = event.target.closest?.('.dashboard-card');
      if (!card || !draggedWidget) return;
      event.preventDefault();
      const source = event.dataTransfer.getData('text/plain') || draggedWidget;
      const [sourceScope, sourceId] = source.split(':');
      const targetScope = card.dataset.layoutScope || 'sheet';
      const target = card.dataset.widget || '';
      document.querySelectorAll('.dashboard-card.drag-over, .dashboard-card.is-dragging').forEach((item) => item.classList.remove('drag-over', 'is-dragging'));
      if (sourceScope === targetScope) {
        if (sourceScope === 'top') dropTopWidget(sourceId, target);
        else dropSheetWidget(sourceId, target);
      }
      draggedWidget = '';
    });

    document.addEventListener('dragend', () => {
      draggedWidget = '';
      document.querySelectorAll('.dashboard-card.drag-over, .dashboard-card.is-dragging').forEach((item) => item.classList.remove('drag-over', 'is-dragging'));
    });

    document.addEventListener('change', (event) => {
      if (event.target.matches?.('input[name="kaiDisciplines"], [data-new-book]')) {
        adjustNewCharacterDisciplines(event.target.closest('form'));
      }
    });

    document.addEventListener('submit', async (event) => {
      event.preventDefault();
      const form = event.target;
      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());
      if (form.id === 'sectionForm') await action({ action: 'set_position', book: Number(data.book), section: Number(data.section) });
      if (form.id === 'itemForm' || form.id === 'quickItemForm') await action({ action: 'add_item', type: data.type, item: data.item });
      if (form.id === 'noteForm') await action({ action: 'note', text: data.text });
      if (form.id === 'saveForm') await action({ action: 'save', path: data.path });
      if (form.id === 'continueBookForm') {
        const armourySelections = formData.getAll('armouryChoices');
        const nextBook = Number(form.dataset.nextBook || 0);
        const equipmentRule = equipmentChoiceRuleForBook(nextBook);
        if (
          [2, 3, 4, 5].includes(nextBook)
          && (
            armourySelections.length < equipmentRule.min
            || armourySelections.length > equipmentRule.max
            || (equipmentRule.exact && armourySelections.length !== equipmentRule.max)
          )
        ) {
          const expected = equipmentRule.exact
            ? `exactly ${equipmentRule.max}`
            : `up to ${equipmentRule.max}`;
          setReceipt({
            summary: `Book ${nextBook} - Choose ${expected} equipment items.`,
            details: [receiptDetail('Selected', `${armourySelections.length}/${equipmentRule.max}`)]
          });
          return;
        }
        await action({
          action: 'continue_book',
          kaiDiscipline: data.kaiDiscipline,
          weaponskillRoll: data.weaponskillRoll,
          goldRoll: data.goldRoll,
          armouryChoices: nextBook === 2 ? armourySelections : [],
          equipmentChoices: [3, 4, 5].includes(nextBook) ? armourySelections : [],
          weaponExchanges: formData.getAll('weaponExchanges').filter(Boolean),
          safekeepingSpecialItems: formData.getAll('safekeepingSpecialItems').filter(Boolean)
        });
      }
      if (form.id === 'combatForm') await action({
        action: 'combat_start',
        name: data.name,
        cs: Number(data.cs),
        endurance: Number(data.endurance),
        modifier: Number(data.modifier || 0),
        activeWeapon: data.activeWeapon,
        canEvade: data.canEvade === 'true',
        evadeAfterRounds: Number(data.evadeAfterRounds || 0),
        victoryRoute: data.victoryRoute,
        evadeRoute: data.evadeRoute
      });
      if (form.id === 'roundForm') await action({ action: 'combat_round', activeWeapon: data.activeWeapon, roll: data.roll });
      if (form.id === 'newForm') {
        const bookNumber = Number(data.bookNumber || 1);
        const kaiSelections = formData.getAll('kaiDisciplines');
        if (kaiSelections.length !== 5) {
          setReceipt({
            summary: 'Character - Choose exactly 5 Kai Disciplines.',
            details: [receiptDetail('Selected', `${kaiSelections.length}/5`)]
          });
          return;
        }
        const armourySelections = formData.getAll('armouryChoices');
        const equipmentRule = equipmentChoiceRuleForBook(bookNumber);
        if (
          [2, 3, 4, 5].includes(bookNumber)
          && (
            armourySelections.length < equipmentRule.min
            || armourySelections.length > equipmentRule.max
            || (equipmentRule.exact && armourySelections.length !== equipmentRule.max)
          )
        ) {
          const expected = equipmentRule.exact
            ? `exactly ${equipmentRule.max}`
            : `up to ${equipmentRule.max}`;
          setReceipt({
            summary: `Book ${bookNumber} - Choose ${expected} equipment items.`,
            details: [receiptDetail('Selected', `${armourySelections.length}/${equipmentRule.max}`)]
          });
          return;
        }
        await action({
          action: 'new',
          name: data.name,
          bookNumber,
          kaiDisciplines: kaiSelections,
          goldRoll: data.goldRoll,
          armouryChoices: bookNumber === 2 ? armourySelections : [],
          equipmentChoices: [3, 4, 5].includes(bookNumber) ? armourySelections : []
        });
      }
      form.reset?.();
    });

    document.querySelectorAll('.book-button').forEach((button) => {
      button.addEventListener('click', () => loadBook(Number(button.dataset.book), null));
    });
    document.getElementById('currentBtn').addEventListener('click', () => syncBookToState());
    document.getElementById('titleBtn').addEventListener('click', () => loadBook(activeBook, null));

    function refreshAssistantAppearance(settings = settingsApi.readLocal()) {
      assistantSettings = settingsApi.apply(settings);
      settingsApi.injectReaderTheme(bookFrame, assistantSettings);
      if (cliTerminal) cliTerminal.options.theme = cliTheme();
      if (activeView === 'settings') render();
    }

    window.addEventListener('lonewolf-settings-changed', (event) => {
      refreshAssistantAppearance(event.detail || settingsApi.readLocal());
    });
    window.addEventListener('pageshow', () => {
      refreshAssistantAppearance(settingsApi.readLocal());
    });
    window.addEventListener('focus', () => {
      refreshAssistantAppearance(settingsApi.readLocal());
    });
    window.addEventListener('storage', (event) => {
      if (settingsApi.appearanceStorageKeys().includes(event.key)) refreshAssistantAppearance(settingsApi.readLocal());
    });

    bookFrame.addEventListener('load', () => {
      try {
        const url = new URL(bookFrame.contentWindow.location.href);
      const match = url.pathname.match(/\/books\/lw\/([^/]+)\/sect(\d+)\.htm$/i);
      const titleMatch = url.pathname.match(/\/books\/lw\/([^/]+)\/title\.htm$/i);
        const folder = match?.[1] || titleMatch?.[1];
        const book = books.find((item) => item.folder === folder);
        if (book) {
          activeBook = book.number;
          activeSection = match ? Number(match[2]) : null;
          renderReaderTitle();
        }
        const doc = bookFrame.contentDocument;
        if (!doc) return;
        settingsApi.injectReaderTheme(bookFrame, assistantSettings);
        doc.addEventListener('click', async (event) => {
          const link = event.target.closest?.('a[href]');
          if (!link) return;
          const target = sectionTargetFromUrl(new URL(link.href, bookFrame.contentWindow.location.href));
          if (!target) return;
          event.preventDefault();
          if (target.book === Number(currentCharacter().BookNumber || 1)) {
            await action({ action: 'route', section: target.section });
          } else {
            await action({ action: 'set_position', book: target.book, section: target.section });
          }
        }, true);
      } catch {}
    });

    fetchState().catch((error) => {
      serverStatus.textContent = 'Disconnected';
      setReceipt({
        summary: `Connection - ${error.message}`,
        title: 'Connection Error',
        details: [
          receiptDetail('Status', error.message),
          receiptDetail('Try', 'Start the local server and open the assistant from localhost.')
        ]
      });
      loadBook(1, null);
    });
  </script>
</body>
</html>
