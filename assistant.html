<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lone Wolf - Web Assistant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: #10130e;
      color: #efe8d0;
      font-family: Arial, sans-serif;
    }
    button, input, select {

      color: #f2d27a;
      cursor: pointer;

    button.active { background: #f2d27a; color: #171b12; border-color: #f2d27a; }
    button.danger { color: #ffb4a8; border-color: #7e4038; }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    input, select {
      min-height: 30px;
      border: 1px solid #6d5f35;
      border-radius: 4px;
      background: #10130e;
      color: #efe8d0;
      padding: 0.3rem 0.45rem;
      min-width: 0;

    }
    .mode-indicator {

      display: inline-flex;

      background: #10130e;
      color: #f2d27a;
      font-size: 0.72rem;

    .workspace {

      text-overflow: ellipsis;

      border-right: 5px solid transparent;

      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));

    .top-dashboard .wide {

    }
    .top-dashboard .extra-wide {

    .top-dashboard .dashboard-card.size-compact {
      grid-column: span 1;
    }
    .top-dashboard .dashboard-card.size-full {
      grid-column: 1 / -1;
    }
    .status-value {
      color: #f2d27a;
      font-weight: 700;
      font-size: 1rem;
      overflow-wrap: anywhere;
    }
    .status-subvalue {
      margin-top: 0.15rem;
      color: #efe8d0;
      font-size: 0.86rem;
      overflow-wrap: anywhere;
    }
    .layout-controls {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .layout-controls select {
      flex: 1 1 190px;

    .quick-column {

      align-content: start;
      gap: 0.35rem;
    }
    .quick-card {
      padding: 0.5rem;
      border: 1px solid #4e4528;
      border-radius: 6px;
      background: #171b12;
    }
    .quick-title {
      color: #aeb091;
      font-size: 0.72rem;
      text-transform: uppercase;
    }
    .quick-panel .controls {
      gap: 0.28rem;
    }
    .quick-panel input,
    .quick-panel select {
      min-height: 28px;
      font-size: 0.78rem;
    }
    .quick-panel button {
      min-height: 28px;
      padding: 0.2rem 0.45rem;
      font-size: 0.76rem;
    }
    .quick-stat-label {
      min-width: 38px;
      color: #d8d0b8;

    }
    .quick-note {

    .mode-note {

    }

      margin-bottom: 0.25rem;
      padding: 0.22rem 0.35rem;
    }

      min-width: 54px;
    }
    .tabs button {
      padding: 0.28rem 0.55rem;
      font-size: 0.78rem;
    }
    #view {
      flex: 1;
      overflow: auto;
      padding: 0.65rem;
    }
    #view.view-card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-content: start;
      gap: 0.65rem;
    }
    #view.view-card-grid > .panel {

    }
    .dashboard-card {
      position: relative;
    }
    .dashboard-card[hidden],
    .quick-card[hidden],
    .tabs[hidden] {
      display: none !important;
    }
    .dashboard-card.card-size-small {
      grid-column: auto;
      padding: 0.55rem;
    }
    .dashboard-card.card-size-medium {
      grid-column: auto;
    }
    .dashboard-card.card-size-large {
      grid-column: 1 / -1;
    }
    .quick-panel .dashboard-card.card-size-large,
    .tabs.dashboard-card.card-size-large {
      grid-column: 1 / -1;
    }
    .card-menu-button {
      position: absolute;
      top: 0.22rem;
      right: 0.35rem;
      z-index: 25;
    }
    .card-collapse-button {
      position: absolute;
      top: 0.22rem;
      right: 1.75rem;
      z-index: 25;
    }
    .top-dashboard .dashboard-card.card-collapsed,
    .quick-panel .dashboard-card.card-collapsed {
      padding-top: 0.55rem;
    }
    .dashboard-card > .card-collapse-button,
    .dashboard-card > .card-menu-button,
    .top-dashboard .dashboard-card > .card-collapse-button,
    .top-dashboard .dashboard-card > .card-menu-button,
    .quick-panel .dashboard-card > .card-collapse-button,
    .quick-panel .dashboard-card > .card-menu-button,
    .tabs.dashboard-card > .card-collapse-button,
    .tabs.dashboard-card > .card-menu-button {
      width: 20px;
      min-width: 20px;
      height: 20px;
      min-height: 20px;
      padding: 0;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 999px;
      font-size: 0;
      line-height: 0;
      text-align: center;
    }
    .card-menu {
      position: absolute;
      top: 1.9rem;
      right: 0.35rem;
      width: min(210px, calc(100% - 0.7rem));
    }
    .dashboard-card > h2,
    .dashboard-card > .quick-title,
    .dashboard-card > .panel-title-row,
    .dashboard-card > .section-subtitle,
    .dashboard-card .combat-meter-title-row {
      padding-right: 3.35rem;
    }
    .dashboard-card > .quick-title {
      min-height: 20px;
      line-height: 20px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dashboard-card [data-card-help] {
      cursor: help;
    }
    .card-collapsed-title {
      display: none;
      min-height: 20px;
      padding-right: 3.35rem;
      color: #f2d27a;
      font: 700 0.82rem Georgia, "Times New Roman", serif;
      line-height: 20px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dashboard-card.card-collapsed {
      min-height: 34px;
    }
    .dashboard-card.card-collapsed > :not(.card-collapse-button):not(.card-menu-button):not(.card-menu):not(.card-collapsed-title) {
      display: none !important;
    }
    .dashboard-card.card-collapsed > .card-collapsed-title {
      display: block;
    }
    .dashboard-card.card-collapsed > .card-collapse-button::before {
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-left: 6px solid currentColor;
      border-right: 0;

    .sheet-layout {
      display: grid;

      gap: 0.65rem;
      align-items: start;
    }
    .sheet-layout .panel,
    .layout-bar {
      margin-bottom: 0;
    }
    .dashboard-card.wide {
      grid-column: 1 / -1;
    }
    .sheet-layout .dashboard-card.size-compact {
      grid-column: auto;
    }
    .sheet-layout .dashboard-card.size-full {
      grid-column: 1 / -1;
    }
    .dashboard-card.is-dragging {
      opacity: 0.55;
    }
    .dashboard-card.drag-over {

    }

    }

      background: #1d1512;
    }

    }

<body>
  <header>
    <a href="index.html" target="_top">Home</a>
    <h1>Lone Wolf</h1>
    <div class="spacer"></div>
    <div class="mode-indicator" id="modeIndicator">Auto Mode</div>
    <div class="status-line" id="serverStatus">Loading...</div>
  </header>

  <main class="workspace">
    <section class="reader-pane" aria-label="Book reader">
      <div class="toolbar">
        <button class="book-button" type="button" data-book="1">Book 1</button>
        <button class="book-button" type="button" data-book="2">Book 2</button>
        <button class="book-button" type="button" data-book="3">Book 3</button>
        <button class="book-button" type="button" data-book="4">Book 4</button>

        <button type="button" id="titleBtn">Title</button>
        <span class="reader-title" id="readerTitle">Loading...</span>
      </div>
      <iframe id="book-frame" name="book-frame" title="Lone Wolf book"></iframe>
    </section>

    <section class="app-pane" aria-label="Lone Wolf web assistant">
      <button class="app-menu-button" type="button" id="appMenuButton" data-app-menu-toggle aria-label="Assistant menu" title="Assistant menu"></button>
      <div class="menu-popover app-menu-popover" id="appMenu" hidden></div>
      <div class="status-grid" id="statusGrid"></div>
      <section class="quick-panel" id="quickPanel" aria-label="Quick actions"></section>
      <div class="quick-tabs-divider" id="quickTabsDivider" aria-hidden="true"></div>
      <nav class="tabs" id="tabs"></nav>
      <section id="view"></section>
      <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="false"></div>
      <div class="message" id="message">Ready.</div>
    </section>
  </main>

  <script>
    if (window.location.protocol === 'file:') {
      window.LONEWOLF_REDUX_FILE_MODE_BLOCKED = true;
      document.body.innerHTML = `
        <main class="file-mode-lock">
          <h1>Start Lone Wolf From Localhost</h1>
          <p>This assistant is a local web app, not a standalone file page. Opening <code>assistant.html</code> directly can make browser links resolve against your drive root.</p>
          <p>Start the server first:</p>
          <code>powershell -ExecutionPolicy Bypass -File "C:\\Scripts\\LoneWolf_ActionAssistant_Redux\\Launch-LoneWolfRedux.ps1"</code>
          <p>Then open:</p>
          <code>http://localhost:8797/assistant.html</code>
        </main>
      `;
      throw new Error('Lone Wolf assistant must be opened from localhost.');
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="assets/js/lw-settings.js"></script>
  <script>
    if (window.LONEWOLF_REDUX_FILE_MODE_BLOCKED) {
      throw new Error('Lone Wolf assistant must be opened from localhost.');
    }

    const books = [
      { number: 1, title: 'Flight from the Dark', folder: '01fftd', sections: 350 },
      { number: 2, title: 'Fire on the Water', folder: '02fotw', sections: 350 },
      { number: 3, title: 'The Caverns of Kalte', folder: '03tcok', sections: 350 },
      { number: 4, title: 'The Chasm of Doom', folder: '04tcod', sections: 350 },
      { number: 5, title: 'Shadow on the Sand', folder: '05sots', sections: 400 }
    ];
    const book2Armoury = [
      ['sword', 'Sword'],
      ['short-sword', 'Short Sword'],
      ['two-meals', 'Two Meals'],
      ['chainmail-waistcoat', 'Chainmail Waistcoat'],
      ['mace', 'Mace'],
      ['healing-potion', 'Healing Potion'],
      ['quarterstaff', 'Quarterstaff'],
      ['spear', 'Spear'],
      ['shield', 'Shield'],
      ['broadsword', 'Broadsword']
    ];
    const book3Equipment = [
      ['sword', 'Sword'],
      ['short-sword', 'Short Sword'],
      ['padded-leather-waistcoat', 'Padded Leather Waistcoat'],
      ['spear', 'Spear'],
      ['mace', 'Mace'],
      ['warhammer', 'Warhammer'],
      ['axe', 'Axe'],
      ['potion-of-laumspur', 'Potion of Laumspur'],
      ['quarterstaff', 'Quarterstaff'],
      ['special-rations', 'Special Rations'],
      ['broadsword', 'Broadsword']
    ];
    const book4Equipment = [
      ['warhammer', 'Warhammer'],
      ['dagger', 'Dagger'],
      ['two-potions-of-laumspur', 'Two Potions of Laumspur'],
      ['sword', 'Sword'],
      ['spear', 'Spear'],
      ['five-special-rations', 'Five Special Rations'],
      ['mace', 'Mace'],
      ['chainmail-waistcoat', 'Chainmail Waistcoat'],
      ['shield', 'Shield']
    ];
    const book5Equipment = [
      ['dagger', 'Dagger'],
      ['potion-of-laumspur', 'Potion of Laumspur'],
      ['sword', 'Sword'],
      ['spear', 'Spear'],
      ['two-special-rations', '2 Special Rations'],
      ['mace', 'Mace'],
      ['shield', 'Shield']
    ];
    const kaiDisciplines = ['Camouflage', 'Hunting', 'Sixth Sense', 'Tracking', 'Healing', 'Weaponskill', 'Mindshield', 'Mindblast', 'Animal Kinship', 'Mind Over Matter'];
    const views = [
      ['sheet', 'Sheet'],
      ['inventory', 'Inventory'],
      ['disciplines', 'Disciplines'],
      ['sections', 'Sections'],
      ['combat', 'Combat'],
      ['achievements', 'Achievements'],
      ['saves', 'Saves'],
      ['notes', 'Notes']
    ];

    const bookFrame = document.getElementById('book-frame');
    const readerTitle = document.getElementById('readerTitle');
    const serverStatus = document.getElementById('serverStatus');
    const statusGrid = document.getElementById('statusGrid');
    const quickPanel = document.getElementById('quickPanel');
    const quickTabsDivider = document.getElementById('quickTabsDivider');
    const tabs = document.getElementById('tabs');
    const view = document.getElementById('view');
    const toastStack = document.getElementById('toastStack');
    const message = document.getElementById('message');
    const appMenu = document.getElementById('appMenu');
    const modeIndicator = document.getElementById('modeIndicator');
    const settingsApi = window.LoneWolfReduxSettings;
    let assistantSettings = settingsApi.apply(settingsApi.readLocal());
    let app = null;
    let activeView = 'sheet';
    let activeBook = 1;
    let activeSection = null;
    let draggedWidget = '';
    let activeCardMenu = '';
    let bookFiles = { Installed: true, Books: [] };
    let currentReceipt = { summary: 'Ready.', details: [] };
    let receiptExpanded = false;
    const playModeKey = 'lonewolf_redux.mode';
    const playModes = ['auto', 'manual', 'cli'];
    let playMode = normalizePlayMode(localStorage.getItem(playModeKey));
    let cliTerminal = null;
    let cliFitAddon = null;
    let cliSocket = null;
    let cliResizeHandler = null;
    const topLayoutKey = 'lonewolf_redux.top.layout.v1';
    const topSizeKey = 'lonewolf_redux.top.sizes.v1';
    const sheetLayoutKey = 'lonewolf_redux.sheet.layout.v1';
    const sheetSizeKey = 'lonewolf_redux.sheet.sizes.v1';
    const cardLayoutPrefix = 'lonewolf_redux.cards.layout.';
    const cardSizePrefix = 'lonewolf_redux.cards.size.';
    const cardClosedPrefix = 'lonewolf_redux.cards.closed.';
    const cardCollapsedPrefix = 'lonewolf_redux.cards.collapsed.';
    const cardLabelPrefix = 'lonewolf_redux.cards.labels.';
    const appearancePreferenceKeys = Object.values(settingsApi.keys);
    const uiPreferenceStaticKeys = [topLayoutKey, topSizeKey, sheetLayoutKey, sheetSizeKey, ...appearancePreferenceKeys];
    const uiPreferencePrefixes = [cardLayoutPrefix, cardSizePrefix, cardClosedPrefix, cardCollapsedPrefix, cardLabelPrefix];
    const sizeOrder = ['compact', 'normal', 'full'];
    const sizeLabels = { compact: 'Compact', normal: 'Normal', full: 'Full' };
    let uiPreferencesReady = false;
    let uiPreferenceSaveTimer = null;
    let uiPreferenceSaveSuspended = false;
    const topWidgets = [
      ['page-layout', 'Page Layout'],
      ['status-book', 'Book'],
      ['status-section', 'Section'],
      ['status-end', 'END'],
      ['status-gold', 'Gold'],
      ['status-cs', 'CS'],
      ['quick-section', 'Section Actions'],
      ['quick-vitals', 'Vitals'],
      ['quick-add', 'Add Item'],
      ['quick-drop', 'Drop Item'],
      ['tabs', 'Tabs'],
      ['sheet-layout', 'Sheet Layout']
    ];
    const sheetWidgets = [
      ['action', 'Action Chart'],
      ['choices', 'Choices'],
      ['new', 'New Character'],
      ['stored', 'Stored Gear']
    ];

    function bookByNumber(number) {
      return books.find((book) => book.number === Number(number)) || books[0];
    }

    function currentCharacter() { return app.state.Character; }
    function currentInventory() { return app.state.Inventory; }
    function currentCombat() { return app.state.Combat; }
    function currentFlow() { return app.sectionFlow || {}; }
    function currentDeath() { return app.death || app.state.Automation?.DeathState || { Active: false }; }
    function currentBookComplete() { return app.bookComplete || { Active: false }; }
    function currentAchievements() { return app.achievements || app.state.Achievements || {}; }

    function normalizePlayMode(mode) {
      return playModes.includes(mode) ? mode : 'auto';
    }

    function playModeLabel(mode = playMode) {
      const labels = { auto: 'Auto Mode', manual: 'Manual Mode', cli: 'CLI Mode' };
      return labels[normalizePlayMode(mode)];
    }

    function isManualMode() { return playMode === 'manual'; }
    function isCliMode() { return playMode === 'cli'; }

    function setModeIndicator() {
      if (modeIndicator) modeIndicator.textContent = playModeLabel();
    }

    function statControlName(stat) {
      const key = text(stat).toLowerCase();
      if (['end', 'endurance'].includes(key)) return 'END';
      if (['wp', 'willpower'].includes(key)) return 'Unsupported';
      if (['cs', 'combat_skill', 'combat skill'].includes(key)) return 'CS';
      if (['gold', 'crowns', 'goldcrowns', 'nobles'].includes(key)) return 'Gold Crowns';
      return text(stat, 'Stat');
    }

    function statControlLocation(stat) {
      const key = text(stat).toLowerCase();
      if (['gold', 'crowns', 'goldcrowns', 'nobles'].includes(key)) return 'Inventory tab > Gold Crowns controls';
      return `Vitals card > ${statControlName(stat)}`;
    }

    function itemContainerLabel(container) {
      const key = text(container, 'backpack').toLowerCase();
      if (key === 'weapon') return 'Weapon';
      if (key === 'special') return 'Special';
      return 'Backpack';
    }

    function conditionAdvice(condition) {
      if (!condition || typeof condition !== 'object') return '';
      const kind = text(condition.type).toLowerCase();
      if (kind === 'flag') return `if ${friendlyFlagName(condition.key)} is ${condition.value === false ? 'off' : 'on'}`;
      if (kind === 'item') return `if you have ${text(condition.name, 'the required item')}`;
      if (kind === 'power') return `if you have ${text(condition.name, 'the required Kai Discipline')}`;
      if (kind === 'no_power') return `if you do not have ${text(condition.name, 'the required Kai Discipline')}`;
      if (kind === 'wp_gt' || kind === 'wp_gte') return '';
      if (kind === 'end_lt') return `if END is less than ${text(condition.value, 'the listed value')}`;
      if (kind === 'end_gte') return `if END is at least ${text(condition.value, 'the listed value')}`;
      if (kind === 'staff_available') return '';
      return '';
    }

    function manualStatAdvice(action) {
      const stat = statControlName(action.stat);
      const location = statControlLocation(action.stat);
      const mode = text(action.mode, 'delta').toLowerCase();
      const condition = conditionAdvice(action.condition);
      if (mode === 'set') {
        const value = text(action.value, '0');
        return {
          summary: `Set ${stat} to ${value}`,
          how: `${location}: type ${value} in Set, then click Set.${condition ? ` Only do this ${condition}.` : ''}`
        };
      }
      if (mode === 'half_recover_floor') {
        return {
          summary: `Restore half current ${stat}, rounded down`,
          how: `${location}: calculate half of the current ${stat}, rounded down, then add that amount with Set or the +1 button.${condition ? ` Only do this ${condition}.` : ''}`
        };
      }
      if (mode === 'half_loss_floor') {
        return {
          summary: `Lose half current ${stat}, rounded down`,
          how: `${location}: calculate half of the current ${stat}, rounded down, then subtract that amount with Set or the -1 button.${condition ? ` Only do this ${condition}.` : ''}`
        };
      }
      const delta = Number(action.delta || 0);
      const verb = delta < 0 ? 'Reduce' : 'Increase';
      const amount = Math.abs(delta);
      const button = delta < 0 ? '-1' : '+1';
      const countText = amount === 1 ? 'once' : `${amount} times`;
      return {
        summary: `${verb} ${stat} by ${amount}`,
        how: `${location}: click ${button} ${countText}, or type the new value in Set and click Set.${condition ? ` Only do this ${condition}.` : ''}`
      };
    }

    function manualMealAdvice(action) {
      const count = Math.max(0, Number(action.count || 1));
      const mode = text(action.mode, 'per_missing').toLowerCase();
      const loss = Number(action.enduranceLossPerMissing || action.enduranceLoss || 0);
      if (mode === 'all_or_loss') {
        const countText = count === 1 ? 'once' : `${count} times`;
        return {
          summary: `Eat ${count} Meal${count === 1 ? '' : 's'} or lose ${loss} END`,
          how: `Inventory tab or Add Item card: click Eat Meal ${countText} if you have enough Meals. If you cannot pay all ${count}, use Vitals card > END to subtract ${loss}.`
        };
      }
      return {
        summary: `Eat up to ${count} Meal${count === 1 ? '' : 's'}; lose ${loss} END per missing Meal`,
        how: `Inventory tab or Add Item card: click Eat Meal once for each Meal you spend. For each missing Meal, use Vitals card > END to subtract ${loss}.`
      };
    }

    function manualActionAdvice(action) {
      if (!action || typeof action !== 'object') return null;
      const kind = text(action.type).toLowerCase();
      if (kind === 'stat') return manualStatAdvice(action);
      if (kind === 'meal') return manualMealAdvice(action);
      if (kind === 'remove_item') {
        const count = Math.max(1, Number(action.count || 1));
        const name = text(action.name, 'item');
        const condition = conditionAdvice(action.condition);
        const countText = count === 1 ? 'once' : `${count} times`;
        return {
          summary: `Remove ${name}${count > 1 ? ` x${count}` : ''}`,
          how: `Drop Item card or Inventory tab: find ${name}, then click Drop ${countText}.${condition ? ` Only do this ${condition}.` : ''}`
        };
      }
      if (kind === 'add_item') {
        const name = text(action.name, 'item');
        const container = itemContainerLabel(action.container);
        const condition = conditionAdvice(action.condition);
        return {
          summary: `Add ${name}`,
          how: `Add Item card: choose ${container}, type ${name}, then click Add.${condition ? ` Only do this ${condition}.` : ''}`
        };
      }
      if (kind === 'flag') {
        const label = friendlyFlagName(action.key);
        const value = action.value === false ? 'off' : 'on';
        return {
          summary: `Turn ${label} ${value}`,
          how: `Choices card > Status Flags: click Set to turn ${label} on, or Clear to turn it off. If the flag is not listed, use Notes to record: ${label} ${value}.`
        };
      }
      if (kind === 'restore_stored_nobles') {
        const extra = Number(action.extra || 0);
        return {
          summary: `Restore stored Gold Crowns${extra ? ` and add ${extra}` : ''}`,
          how: 'Inventory tab > Gold Crowns controls: add the stored Gold Crown total, plus any listed extra, then update the value with Set.'
        };
      }
      if (kind === 'gear') {
        const available = action.available !== false;
        return {
          summary: available ? 'Restore stored gear' : 'Store all carried gear',
          how: available
            ? 'Inventory tab > Stored Gear: move stored Weapons and Backpack Items back into inventory.'
            : 'Inventory tab: note current Weapons and Backpack Items, then remove them from active inventory.'
        };
      }
      if (kind === 'weapons') {
        const available = action.available !== false;
        return {
          summary: available ? 'Restore stored Weapons' : 'Store carried Weapons',
          how: available
            ? 'Inventory tab > Stored Gear: move stored Weapons back into active Weapons.'
            : 'Inventory tab > Weapons: note each Weapon, then click Drop for each active Weapon.'
        };
      }
      if (kind === 'backpack_stash' || kind === 'backpack') {
        const available = action.available !== false;
        return {
          summary: available ? 'Restore Backpack access' : 'Remove Backpack access',
          how: available
            ? 'Inventory tab > Stored Gear: move stored Backpack Items back into Backpack.'
            : 'Inventory tab > Backpack: note the Backpack Items, then remove or mark them unavailable.'
        };
      }
      if (kind === 'ending') {
        const ending = text(action.ending, 'ending');
        return {
          summary: ending === 'success' ? 'Complete the book' : `Mark ${ending}`,
          how: ending === 'success'
            ? 'Completion screen: click Complete Book when it appears.'
            : 'Death screen: use Repeat to retry this section, or Rewind to return to the previous checkpoint.'
        };
      }
      return {
        summary: `Handle ${text(action.type, 'section action')}`,
        how: 'Use the matching sheet, inventory, combat, or notes controls to record this section action.'
      };
    }

    function compactAdviceSummary(items, fallback) {
      const summaries = arr(items).map((item) => text(item?.summary).trim()).filter(Boolean);
      if (!summaries.length) return fallback;
      if (summaries.length === 1) return summaries[0];
      return `${summaries.length} manual steps`;
    }

    function manualModeControlsRow() {
      return receiptDetail('Mode controls', 'Assistant menu > Mode: click Auto to turn automation on, Manual for advice-only play, or CLI for the terminal view.');
    }

    function manualGuideWhy(kind, label) {
      if (kind === 'section effects') {
        return label
          ? `We flagged this because it is one of those easy-to-miss bookkeeping beats between paragraphs: ${label}. Manual Mode leaves the pencil in your hand, but the guide still points at the math.`
          : 'No hidden bookkeeping on this stop. The audit does not have a simple section effect here, so you can read on and use the book links normally.';
      }
      if (kind === 'roll helpers') {
        return label
          ? `This is a random-number moment. The guide calls it out so you can see the modifiers and the possible routes before you commit to the result.`
          : 'This section only needs a plain 0-9 random digit. Nothing special is being added by the audit.';
      }
      if (kind === 'combat presets') {
        return `This fight has a prepared setup in the guide data. The preset is there so the enemy stats, special limits, and follow-up routes do not get lost once the fight starts.`;
      }
      if (kind === 'section loot') {
        return `This is a pick-up or section choice the guide team pulled forward because inventory decisions are easy to skip while following the story.`;
      }
      if (kind === 'cartwheel') {
        return `Cartwheel has player-chosen stakes, a wraparound number wheel, and a 40 Crown table limit. The mini-game keeps that math in one place while you choose how bold to be.`;
      }
      if (kind === 'portholes') {
        return `Portholes asks for six dice results and changes player Gold every throw. The mini-game keeps the stake, automatic double-zero win, and table result in one visible place.`;
      }
      if (kind === 'section costs') {
        return `Manual Mode keeps the choice with you, while the guide keeps the cost visible.`;
      }
      if (kind === 'combat auto-resolve') {
        return 'Auto-resolve would play the fight forward for you. Manual Mode keeps the duel in your hands, one combat round at a time.';
      }
      return 'Manual Mode keeps the assistant from changing your sheet automatically, but it can still tell you what the audit would have done.';
    }

    function rollOutcomeText(outcome) {
      const route = outcome.route !== undefined ? ` -> section ${outcome.route}` : '';
      const nextStage = outcome.nextStage !== undefined ? ` -> next stage ${outcome.nextStage}` : '';
      const ending = outcome.ending !== undefined ? ` -> ${outcome.ending}` : '';
      const suffix = route || nextStage || ending;
      const label = text(outcome.label || outcome.outcome, 'outcome');
      const test = text(outcome.test).toLowerCase();
      if (test === 'range') return `${text(outcome.min, '?')}-${text(outcome.max, '?')}: ${label}${suffix}`;
      if (test === 'values') return `${arr(outcome.values).join(', ')}: ${label}${suffix}`;
      if (test === 'even' || test === 'odd') return `${test}: ${label}${suffix}`;
      return `${label}${suffix}`;
    }

    function stagedRollSummary(entry, stagedState) {
      const staged = entry?.stagedRoll || null;
      if (!staged) return '';
      const state = stagedState || {};
      const stageLabel = text(state.StageLabel, '');
      const stagePrefix = state.Complete ? 'Complete' : 'Next';
      return [text(staged.summary, 'Staged section roll'), stageLabel ? `${stagePrefix}: ${stageLabel}` : '']
        .filter(Boolean)
        .join(' - ');
    }

    function stagedRollAdviceText(staged) {
      return arr(staged.stages).map((stage) => {
        const outcomes = arr(stage.outcomes).map(rollOutcomeText).join('; ');
        return `${text(stage.label || stage.id, 'Stage')}: ${outcomes}`;
      }).join(' | ');
    }

    function combatPresetAdvice(preset) {
      if (!preset) return null;
      const enemy = preset.enemy || arr(preset.enemies)[0] || {};
      const label = text(preset.label || enemy.name, 'Section combat');
      const parts = [
        `Enemy=${text(enemy.name || label, 'Enemy')}`,
        `CS=${text(enemy.cs, '?')}`,
        `END=${text(enemy.endurance, '?')}`
      ];
      if (preset.modifier !== undefined) parts.push(`CS Modifier=${formatSigned(preset.modifier)}`);
      if (preset.victoryRoute !== undefined) parts.push(`Victory Section=${preset.victoryRoute}`);
      if (preset.evadeRoute !== undefined) parts.push(`Evade Section=${preset.evadeRoute}`);
      return {
        summary: `Start ${label}`,
        how: `Combat tab > Start Tracked Combat: set ${parts.join(', ')}, then click Start Combat.`
      };
    }

    function manualSectionAdvice(kind = 'automation', options = {}) {
      const flow = currentFlow();
      const entry = flow.Entry || {};
      const automation = flow.Automation || {};
      const details = [
        receiptDetail('Mode', 'Manual Mode'),
        receiptDetail('Where', locationLabel({ state: app.state }))
      ];
      let summary = `Manual Advice - ${kind}`;
      let title = 'Manual Advice';

      if (kind === 'section effects') {
        const actions = arr(automation.Actions).map(manualActionAdvice).filter(Boolean);
        const actionSummary = compactAdviceSummary(actions, 'No section automation');
        summary = `Manual Advice - ${actionSummary}`;
        title = 'Manual Section Effects';
        details.push(receiptDetail('Why', manualGuideWhy(kind, text(automation.Summary || actionSummary))));
        if (actions.length) {
          details.push(receiptDetail('What I would do', actions.map((item) => item.summary).join('; ')));
          actions.forEach((item) => details.push(receiptDetail('How to do it', item.how)));
        } else {
          details.push(receiptDetail('How to do it', 'No control change is needed for this section effect.'));
        }
      } else if (kind === 'roll helpers') {
        const roll = entry.roll || entry.stagedRoll || {};
        const staged = entry.stagedRoll || null;
        const rollLabel = text(roll.summary, 'Roll 0-9');
        summary = `Manual Advice - ${rollLabel}`;
        title = 'Manual Section Roll';
        details.push(receiptDetail('Why', manualGuideWhy(kind, rollLabel)));
        if (arr(roll.modifiers).length) {
          details.push(receiptDetail('Modifiers', arr(roll.modifiers).map((item) => `${text(item.label, 'Modifier')} ${formatSigned(item.value || 0)}`).join('; ')));
        }
        if (arr(roll.outcomes).length) {
          details.push(receiptDetail('Outcomes', arr(roll.outcomes).map(rollOutcomeText).join('; ')));
        }
        if (staged && arr(staged.stages).length) {
          details.push(receiptDetail('Stages', stagedRollAdviceText(staged)));
        }
        details.push(receiptDetail('How to do it', 'Use a 0-9 random digit. Add listed modifiers. Follow the matching book link or enter the resulting section in the Section card.'));
      } else if (kind === 'combat presets') {
        const preset = arr(entry.combat).find((item) => text(item.id) === text(options.id)) || arr(entry.combat)[0];
        const advice = combatPresetAdvice(preset);
        summary = `Manual Advice - ${advice?.summary || 'Section combat'}`;
        title = 'Manual Combat Setup';
        details.push(receiptDetail('Why', manualGuideWhy(kind)));
        if (advice) details.push(receiptDetail('How to do it', advice.how));
        const perRound = arr(preset?.perRoundActions).map(manualActionAdvice).filter(Boolean);
        if (perRound.length) {
          details.push(receiptDetail('Round upkeep', perRound.map((item) => item.summary).join('; ')));
          perRound.forEach((item) => details.push(receiptDetail('How to do it', item.how)));
        }
      } else if (kind === 'section loot') {
        const option = arr(entry.loot).find((item) => text(item.id) === text(options.id)) || arr(entry.loot)[0];
        const actions = arr(option?.actions).map(manualActionAdvice).filter(Boolean);
        summary = `Manual Advice - ${text(option?.label, 'Section loot')}`;
        title = 'Manual Loot Choice';
        details.push(receiptDetail('Why', manualGuideWhy(kind)));
        details.push(receiptDetail('What I would do', compactAdviceSummary(actions, text(option?.label, 'Record the loot choice'))));
        actions.forEach((item) => details.push(receiptDetail('How to do it', item.how)));
      } else if (kind === 'cartwheel') {
        const game = flow.Cartwheel || {};
        summary = 'Manual Advice - Cartwheel';
        title = 'Manual Cartwheel';
        details.push(receiptDetail('Why', manualGuideWhy(kind)));
        details.push(receiptDetail('Table', `Exact hit pays ${text(game.ExactMultiplier, 8)}x. Adjacent hit pays ${text(game.AdjacentMultiplier, 5)}x. Table winnings cap at ${text(game.WinLimit, 40)} Gold Crowns.`));
        details.push(receiptDetail('How to do it', 'Choose a number 0-9, choose a stake you can cover, roll 0-9, then use Gold Crowns controls to add the payout or subtract the lost stake.'));
      } else if (kind === 'portholes') {
        const game = flow.Portholes || {};
        summary = 'Manual Advice - Portholes';
        title = 'Manual Portholes';
        details.push(receiptDetail('Why', manualGuideWhy(kind)));
        details.push(receiptDetail('Table', `Each throw stakes ${text(game.Stake, 3)} Gold Crowns. Lone Wolf wins ${text(game.WinAmount, 6)} Gold Crowns for the highest total or a double-zero Portholes throw.`));
        details.push(receiptDetail('How to do it', 'Roll two 0-9 dice for each other player and two for Lone Wolf. Add 6 Gold if Lone Wolf wins, subtract 3 Gold if either other player beats him, and leave ties unchanged.'));
      } else if (kind === 'healing') {
        const healing = flow.Healing || {};
        summary = 'Manual Advice - Kai Healing';
        title = 'Manual Healing';
        details.push(receiptDetail('Why', text(healing.Summary, 'Kai Healing can restore 1 END in an eligible non-combat section.')));
        details.push(receiptDetail('How to do it', 'Vitals card: add 1 END, capped at maximum END. Apply it only once for this numbered section visit.'));
      } else if (kind === 'section loss') {
        const choice = arr(flow.LossChoices).find((item) => text(item.Id) === text(options.id)) || arr(flow.LossChoices)[0];
        const replacement = choice?.Replacement || null;
        summary = `Manual Advice - ${text(choice?.Label, 'Choose lost item')}`;
        title = replacement ? 'Manual Exchange Choice' : 'Manual Loss Choice';
        details.push(receiptDetail('Why', text(choice?.Summary, replacement ? 'The section asks you to choose which carried item is exchanged.' : 'The section asks you to choose which carried item is lost.')));
        details.push(receiptDetail('How to do it', replacement ? `Inventory tab: drop the chosen item, then add ${text(replacement.Name, 'the replacement item')}.` : 'Inventory tab: click Drop beside the Weapon or Backpack Item you choose to lose.'));
      } else if (kind === 'section costs') {
        summary = 'Manual Advice - Section cost';
        title = 'Manual Section Cost';
        details.push(receiptDetail('Why', manualGuideWhy(kind)));
        details.push(receiptDetail('How to do it', 'Use the matching sheet controls to apply the cost the book lists.'));
      } else if (kind === 'combat auto-resolve') {
        summary = 'Manual Advice - Resolve combat by hand';
        title = 'Manual Combat Rounds';
        details.push(receiptDetail('Why', manualGuideWhy(kind)));
        details.push(receiptDetail('How to do it', 'Combat tab: choose Active combat weapon and Roll. Click Resolve Round once per combat round.'));
      } else {
        details.push(receiptDetail('Why', manualGuideWhy(kind)));
        details.push(receiptDetail('How to do it', 'Use the matching card controls to update the sheet manually.'));
      }

      details.push(manualModeControlsRow());
      setReceipt({ summary, title, details: details.filter(Boolean) });
    }

    function manualDisabledAttributes(kind = 'automation') {
      return isManualMode()
        ? 'aria-disabled="true"'
        : '';
    }

    function modeActionButton(attrs, label, kind = 'automation') {
      const title = isManualMode()
        ? `title="Manual mode: click for ${escapeHtml(kind)} advice. No sheet changes will be applied."`
        : '';
      return `<button type="button" ${attrs} ${manualDisabledAttributes(kind)} ${title}>${label}</button>`;
    }

    function cloneAppSnapshot(value) {
      try {
        return value ? JSON.parse(JSON.stringify(value)) : null;
      } catch {
        return null;
      }
    }

    function receiptDetail(label, value) {
      const clean = text(value).trim();
      return clean ? { label, value: clean } : null;
    }

    function setReceipt(receipt) {
      currentReceipt = receipt || { summary: 'Ready.', details: [] };
      receiptExpanded = false;
      renderReceipt();
    }

    function sectionStatusReceiptDetails() {
      if (!app) return [];
      const flow = currentFlow();
      const entry = flow.Entry || {};
      const automation = flow.Automation || {};
      const details = [];

      if (automation.Summary) {
        details.push(receiptDetail('Entry Effect', `${automation.Applied ? 'Applied' : 'Ready'}: ${automation.Summary}`));
        arr(automation.Messages).forEach((line) => {
          details.push(receiptDetail('Entry Result', line));
        });
      }

      arr(flow.RouteChecks).forEach((check) => {
        const label = text(check.Label, 'Route check');
        if (!check.Ready) {
          details.push(receiptDetail('Route Check', `${label}: ${text(check.BlockedReason, 'Apply the entry effect first, then recheck the route.')}`));
          return;
        }
        const matched = check.MatchedOutcome || {};
        const formula = text(check.Formula || check.Summary, 'Current sheet check');
        const value = check.Value !== undefined && check.Value !== null && text(check.Value) !== '' ? `Total ${check.Value}: ` : '';
        const result = matched.Label ? routeCheckOutcomeText(matched) : 'ready';
        details.push(receiptDetail('Route Check', `${label}: ${formula} | ${value}${result}`));
      });

      const lastRoll = flow.LastRoll;
      if (lastRoll) {
        const parts = [
          `Roll ${text(lastRoll.Raw, '?')}`,
          `total ${text(lastRoll.Total, '?')}`,
          text(lastRoll.StageLabel),
          text(lastRoll.Outcome),
          lastRoll.Route ? `section ${lastRoll.Route}` : ''
        ].filter(Boolean);
        details.push(receiptDetail('Roll Result', parts.join(' | ')));
        arr(lastRoll.ActionMessages).forEach((line) => {
          details.push(receiptDetail('Roll Effect', line));
        });
      }

      arr(entry.status).forEach((status) => {
        const current = app.state.Automation?.Flags?.[status.key] === true;
        details.push(receiptDetail('Status Flag', `${text(status.label || status.key, 'Status')}: ${current ? 'On' : 'Off'}`));
      });

      return details.filter(Boolean);
    }

    function sectionStatusReceipt() {
      const details = sectionStatusReceiptDetails();
      const section = app?.state?.CurrentSection || '?';
      if (!details.length) {
        return {
          summary: `Section ${section} - no automation status`,
          title: 'Section Status',
          details: []
        };
      }
      return {
        summary: `Section ${section} status - ${details[0].value}`,
        title: 'Section Status',
        details
      };
    }

    function withSectionStatus(receipt) {
      const details = sectionStatusReceiptDetails();
      if (!details.length) return receipt;
      return {
        ...receipt,
        details: [
          ...arr(receipt?.details),
          receiptDetail('Section Status', 'Current section bookkeeping follows.'),
          ...details
        ].filter(Boolean)
      };
    }

    function renderReceipt() {
      const details = arr(currentReceipt?.details).filter(Boolean);
      const expandable = details.length > 0;
      const summary = text(currentReceipt?.summary, 'Ready.');
      message.className = `message${expandable ? ' event-receipt' : ''}${receiptExpanded ? ' expanded' : ''}`;
      message.setAttribute('role', expandable ? 'button' : 'status');
      message.setAttribute('aria-live', 'polite');
      if (expandable) {
        message.tabIndex = 0;
        message.setAttribute('aria-expanded', receiptExpanded ? 'true' : 'false');
      } else {
        message.removeAttribute('tabindex');
        message.removeAttribute('aria-expanded');
      }
      message.innerHTML = `
        <div class="receipt-summary">
          <span>${escapeHtml(summary)}</span>
          ${expandable ? '<i class="receipt-toggle" aria-hidden="true"></i>' : ''}
        </div>
        ${expandable && receiptExpanded ? `
          <div class="receipt-detail">
            ${details.map((item) => `
              <div class="receipt-detail-row">
                <strong>${escapeHtml(item.label || 'Detail')}</strong>
                <span>${escapeHtml(item.value || '')}</span>
              </div>
            `).join('')}
          </div>
        ` : ''}
      `;
    }

    function toggleReceipt() {
      if (!arr(currentReceipt?.details).filter(Boolean).length) return;
      receiptExpanded = !receiptExpanded;
      renderReceipt();
    }

    function messageLines(value) {
      return text(value)
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);
    }

    function stateFrom(snapshot) { return snapshot?.state || {}; }
    function characterFrom(snapshot) { return stateFrom(snapshot).Character || {}; }
    function inventoryFrom(snapshot) { return stateFrom(snapshot).Inventory || {}; }
    function automationFrom(snapshot) { return stateFrom(snapshot).Automation || {}; }
    function combatFrom(snapshot) { return stateFrom(snapshot).Combat || {}; }

    function locationLabel(snapshot) {
      const state = stateFrom(snapshot);
      const character = characterFrom(snapshot);
      const bookNumber = Number(character.BookNumber || state.CurrentBookNumber || 1);
      const section = Number(state.CurrentSection || character.Section || 1);
      const book = bookByNumber(bookNumber);
      return `Book ${bookNumber}, section ${section}${book?.title ? ` (${book.title})` : ''}`;
    }

    function asNumber(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number : 0;
    }

    function signedValue(delta) {
      return `${delta > 0 ? '+' : ''}${delta}`;
    }

    function statValue(character, inventory, key) {
      if (key === 'END') return asNumber(character.EnduranceCurrent);
      if (key === 'END Max') return asNumber(character.EnduranceMax);
      if (key === 'CS') return asNumber(character.CombatSkillCurrent);
      if (key === 'Gold') return asNumber(inventory.GoldCrowns ?? inventory.Nobles);
      return 0;
    }

    function itemCounts(items) {
      const counts = new Map();
      arr(items).forEach((item) => {
        const label = text(item).trim();
        if (!label) return;
        counts.set(label, (counts.get(label) || 0) + 1);
      });
      return counts;
    }

    function inventoryDiffs(beforeItems, afterItems) {
      const beforeCounts = itemCounts(beforeItems);
      const afterCounts = itemCounts(afterItems);
      const names = new Set([...beforeCounts.keys(), ...afterCounts.keys()]);
      const added = [];
      const removed = [];
      names.forEach((name) => {
        const diff = (afterCounts.get(name) || 0) - (beforeCounts.get(name) || 0);
        if (diff > 0) added.push(`${name}${diff > 1 ? ` x${diff}` : ''}`);
        if (diff < 0) removed.push(`${name}${diff < -1 ? ` x${Math.abs(diff)}` : ''}`);
      });
      return { added, removed };
    }

    function friendlyFlagName(key) {
      const labels = {
        weaponsAvailable: 'Weapons available',
        backpackAvailable: 'Backpack available',
        backpackItemsAvailable: 'Backpack items available'
      };
      return labels[key] || key;
    }

    function stateChangeDetails(beforeSnapshot, afterSnapshot) {
      const beforeCharacter = characterFrom(beforeSnapshot);
      const afterCharacter = characterFrom(afterSnapshot);
      const beforeInventory = inventoryFrom(beforeSnapshot);
      const afterInventory = inventoryFrom(afterSnapshot);
      const beforeFlags = automationFrom(beforeSnapshot).Flags || {};
      const afterFlags = automationFrom(afterSnapshot).Flags || {};
      const details = [];
      let short = '';
      let itemShort = '';

      [
        ['END', 'Endurance'],
        ['CS', 'Combat Skill'],
        ['Gold', 'Gold Crowns']
      ].forEach(([key, label]) => {
        const before = statValue(beforeCharacter, beforeInventory, key);
        const after = statValue(afterCharacter, afterInventory, key);
        if (before === after) return;
        const delta = after - before;
        if (!short) short = `Applied ${signedValue(delta)} ${key}`;
        const suffix = key === 'END'
          ? `/${asNumber(beforeCharacter.EnduranceMax)} -> ${after}/${asNumber(afterCharacter.EnduranceMax)}`
          : ` -> ${after}`;
        details.push(receiptDetail(label, key === 'END' ? `${before}${suffix}` : `${before}${suffix}`));
      });

      if (asNumber(beforeCharacter.EnduranceMax) !== asNumber(afterCharacter.EnduranceMax) && asNumber(beforeCharacter.EnduranceCurrent) === asNumber(afterCharacter.EnduranceCurrent)) {
        details.push(receiptDetail('Endurance Max', `${asNumber(beforeCharacter.EnduranceMax)} -> ${asNumber(afterCharacter.EnduranceMax)}`));
        if (!short) short = 'Updated END maximum';
      }

      [
        ['Weapons', 'Weapons'],
        ['BackpackItems', 'Backpack'],
        ['SpecialItems', 'Special Items']
      ].forEach(([key, label]) => {
        const diff = inventoryDiffs(beforeInventory[key], afterInventory[key]);
        if (diff.added.length) {
          const value = diff.added.join(', ');
          details.push(receiptDetail(label, `Added ${value}`));
          if (!itemShort) itemShort = `Added ${value}`;
        }
        if (diff.removed.length) {
          const value = diff.removed.join(', ');
          details.push(receiptDetail(label, `Removed ${value}`));
          if (!itemShort) itemShort = `Removed ${value}`;
        }
      });
      if (!short && itemShort) short = itemShort;

      const flagKeys = new Set([...Object.keys(beforeFlags || {}), ...Object.keys(afterFlags || {})]);
      flagKeys.forEach((key) => {
        if (beforeFlags?.[key] === afterFlags?.[key]) return;
        const before = beforeFlags?.[key] === true ? 'on' : (beforeFlags?.[key] === false ? 'off' : text(beforeFlags?.[key], 'unset'));
        const after = afterFlags?.[key] === true ? 'on' : (afterFlags?.[key] === false ? 'off' : text(afterFlags?.[key], 'unset'));
        details.push(receiptDetail('Flag', `${friendlyFlagName(key)}: ${before} -> ${after}`));
        if (!short) short = `${friendlyFlagName(key)} ${after}`;
      });

      const beforeState = stateFrom(beforeSnapshot);
      const afterState = stateFrom(afterSnapshot);
      const beforeBook = asNumber(beforeCharacter.BookNumber || beforeState.CurrentBookNumber || 1);
      const afterBook = asNumber(afterCharacter.BookNumber || afterState.CurrentBookNumber || 1);
      const beforeSection = asNumber(beforeState.CurrentSection || 1);
      const afterSection = asNumber(afterState.CurrentSection || 1);
      if (beforeBook !== afterBook || beforeSection !== afterSection) {
        details.push(receiptDetail('Position', `Book ${beforeBook}, section ${beforeSection} -> Book ${afterBook}, section ${afterSection}`));
      }

      return { short, itemShort, details: details.filter(Boolean) };
    }

    function achievementDetails(snapshot) {
      const unlocks = arr(snapshot?.achievementUnlocks);
      if (!unlocks.length) return [];
      const achievements = snapshot?.achievements || {};
      const rows = [
        receiptDetail('Unlocked', unlocks.map((entry) => text(entry.Name, 'Achievement')).join(', '))
      ];
      if (achievements.UnlockedCount !== undefined && achievements.TotalCount !== undefined) {
        rows.push(receiptDetail('Progress', `${achievements.UnlockedCount}/${achievements.TotalCount}`));
      }
      return rows.filter(Boolean);
    }

    function assistantOutputDetail(snapshot) {
      const lines = messageLines(snapshot?.message);
      return lines.length ? receiptDetail('Assistant', lines.join(' | ')) : null;
    }

    function flowLootLabel(snapshot, id) {
      const entry = snapshot?.sectionFlow?.Entry || {};
      const option = arr(entry.loot).find((item) => text(item?.id) === text(id));
      return text(option?.label || id, 'Loot');
    }

    function cartwheelResult(snapshot) {
      return snapshot?.sectionFlow?.Cartwheel?.LastResult || null;
    }

    function routeLabel(route) {
      const label = text(route?.Label, `Go to ${text(route?.Section, '?')}`);
      return route?.EffectLabel ? `${label} (${route.EffectLabel})` : label;
    }

    function lastNewCombatRound(beforeSnapshot, afterSnapshot) {
      const beforeLog = arr(combatFrom(beforeSnapshot).Log);
      const afterLog = arr(combatFrom(afterSnapshot).Log);
      return afterLog.length > beforeLog.length ? afterLog[afterLog.length - 1] : null;
    }

    function combatReceipt(payload, beforeSnapshot, afterSnapshot, changes) {
      const actionName = text(payload.action);
      const combat = combatFrom(afterSnapshot);
      const beforeCombat = combatFrom(beforeSnapshot);
      const enemy = text(combat.EnemyName || beforeCombat.EnemyName, 'Enemy');
      const details = [
        receiptDetail('Enemy', enemy),
        receiptDetail('Weapon', text(combat.ActiveWeapon || beforeCombat.ActiveWeapon || 'Unarmed')),
        ...changes.details
      ];
      const round = lastNewCombatRound(beforeSnapshot, afterSnapshot);
      if (round) {
        details.unshift(receiptDetail('Round', String(round.Round || combat.RoundCount || '?')));
        details.push(receiptDetail('Roll', `${text(round.Roll, '?')} at ratio ${text(round.Ratio, '?')}`));
        details.push(receiptDetail('Result', `Lone Wolf -${text(round.PlayerLoss ?? round.LoneWolfReduxLoss, '0')} END; ${enemy} -${text(round.EnemyLoss, '0')} END`));
        details.push(receiptDetail('Current', `Lone Wolf END ${text(round.FinalPlayerEnd ?? round.PlayerEnd ?? combat.PlayerEnduranceCurrent, '?')}/${text(combat.PlayerEnduranceMax, '?')}; ${enemy} END ${text(round.EnemyEnd ?? combat.EnemyEnduranceCurrent, '?')}/${text(combat.EnemyEnduranceMax, '?')}`));
        details.push(receiptDetail('Why', 'The Combat Results Table used the current combat ratio and roll.'));
        return {
          summary: actionName === 'combat_evade' ? `Combat - Evade round resolved` : `Combat - Round ${text(round.Round || combat.RoundCount, '?')} resolved`,
          title: 'Combat Receipt',
          details: details.filter(Boolean)
        };
      }
      if (actionName === 'combat_start' || actionName === 'section_combat_start') {
        details.push(receiptDetail('Stats', `Lone Wolf CS ${text(combat.PlayerCombatSkill, '?')} vs ${enemy} CS ${text(combat.EnemyCombatSkillEffective ?? combat.EnemyCombatSkill, '?')}; enemy END ${text(combat.EnemyEnduranceCurrent, '?')}/${text(combat.EnemyEnduranceMax, '?')}`));
        details.push(receiptDetail('How', actionName === 'section_combat_start' ? 'Started from this section\'s audited combat preset.' : 'Started from the Combat tab form.'));
        return { summary: `Combat - Started ${enemy}`, title: 'Combat Started', details: details.filter(Boolean) };
      }
      if (actionName === 'combat_auto') {
        const rounds = arr(combat.Log).length - arr(beforeCombat.Log).length;
        details.push(receiptDetail('Rounds', rounds > 0 ? `${rounds} round${rounds === 1 ? '' : 's'} resolved` : 'No new round was resolved'));
        details.push(receiptDetail('Current', `Lone Wolf END ${text(combat.PlayerEnduranceCurrent, '?')}/${text(combat.PlayerEnduranceMax, '?')}; ${enemy} END ${text(combat.EnemyEnduranceCurrent, '?')}/${text(combat.EnemyEnduranceMax, '?')}`));
        return { summary: `Combat - Auto resolved ${Math.max(0, rounds)} round${rounds === 1 ? '' : 's'}`, title: 'Combat Auto Resolve', details: details.filter(Boolean) };
      }
      if (actionName === 'combat_stop') {
        return { summary: `Combat - Stopped ${enemy}`, title: 'Combat Stopped', details: details.filter(Boolean) };
      }
      return null;
    }

    function buildActionReceipt(payload, beforeSnapshot, afterSnapshot) {
      const actionName = text(payload?.action);
      const changes = stateChangeDetails(beforeSnapshot, afterSnapshot);
      const output = assistantOutputDetail(afterSnapshot);
      const achievements = achievementDetails(afterSnapshot);
      const base = [
        receiptDetail('Where', locationLabel(afterSnapshot)),
        ...changes.details,
        output,
        ...achievements
      ].filter(Boolean);

      if (actionName === 'apply_automation') {
        const automation = afterSnapshot?.sectionFlow?.Automation || {};
        const noAutomation = /No simple automation/i.test(text(afterSnapshot?.message));
        const summary = noAutomation ? 'No section automation' : (changes.short || 'Applied section effects');
        return {
          summary: `Automation - ${summary}`,
          title: 'Section Automation',
          details: [
            receiptDetail('Where', locationLabel(afterSnapshot)),
            receiptDetail('Why', noAutomation ? 'No audited simple automation is recorded for this section.' : text(automation.Summary, 'This section has audited automation.')),
            ...changes.details,
            receiptDetail('Audit Result', arr(automation.Messages).join('; ')),
            receiptDetail('How', noAutomation ? 'You pressed Apply Effects, but there was nothing automated to apply.' : 'You pressed Apply Effects. The assistant used the section audit, updated the sheet, and saved the game.'),
            output,
            ...achievements
          ].filter(Boolean)
        };
      }

      if (['use_item', 'karmo_side_effect', 'karmo_finish', 'meal'].includes(actionName)) {
        const item = actionName === 'use_item' ? text(payload.item, 'Item') : (actionName === 'meal' ? (payload.missed ? 'Missed Meal' : 'Meal') : 'Karmo Potion');
        const why = actionName === 'use_item' ? itemUseHelp(item) : (actionName === 'meal' ? 'Meals and missed meals are tracked from the Backpack.' : 'Karmo has special Book 2 timing and side-effect rules.');
        return {
          summary: `Item - ${actionName === 'meal' ? text(changes.short || (payload.missed ? 'Missed meal applied' : 'Meal eaten')) : `Used ${item}`}`,
          title: 'Item Receipt',
          details: [
            receiptDetail('Item', item),
            receiptDetail('Where', locationLabel(afterSnapshot)),
            ...changes.details,
            receiptDetail('Why', why),
            receiptDetail('How', actionName === 'use_item' ? 'You clicked Use beside the item. The assistant applied the configured item effect and saved.' : 'The assistant applied the selected item or meal rule and saved.'),
            output,
            ...achievements
          ].filter(Boolean)
        };
      }

      if (actionName === 'flow_loot') {
        const label = flowLootLabel(beforeSnapshot, payload.id);
        return {
          summary: `Loot - ${changes.itemShort || changes.short || `Applied ${label}`}`,
          title: 'Loot Receipt',
          details: [
            receiptDetail('Loot', label),
            receiptDetail('Where', locationLabel(afterSnapshot)),
            ...changes.details,
            receiptDetail('Why', 'This section offers an audited loot or item choice.'),
            receiptDetail('How', 'You clicked the loot Apply button. The assistant updated inventory or flags and saved.'),
            output,
            ...achievements
          ].filter(Boolean)
        };
      }

      if (actionName === 'cartwheel') {
        const result = cartwheelResult(afterSnapshot) || {};
        const outcome = text(result.Outcome, text(afterSnapshot?.message, 'Cartwheel played'));
        return {
          summary: `Cartwheel - ${outcome}`,
          title: 'Cartwheel Result',
          details: [
            receiptDetail('Bet', `Number ${text(result.Bet, payload.bet)} for ${text(result.Stake, payload.stake)} Gold Crown${Number(result.Stake || payload.stake) === 1 ? '' : 's'}`),
            receiptDetail('Roll', text(result.Roll, payload.raw || '?')),
            receiptDetail('Result', result.Multiplier ? `${outcome}: payout ${text(result.Payout, 0)} Gold Crowns` : `${outcome}: lost ${text(result.GoldStaked, 0)} Gold Crowns`),
            result.TokenUsed ? receiptDetail('Token', 'Free silver token used for this stake.') : null,
            receiptDetail('Table', `Winnings ${text(result.TableWinningsAfter, 0)} / ${text(result.WinLimit, 40)}`),
            result.Note ? receiptDetail('Limit', result.Note) : null,
            ...changes.details,
            receiptDetail('Why', 'Cartwheel pays exact hits at 8x stake and adjacent hits at 5x; 0 sits between 9 and 1. The table caps winnings at 40 Gold Crowns.'),
            output,
            ...achievements
          ].filter(Boolean)
        };
      }

      if (actionName === 'healing') {
        return {
          summary: `Healing - ${changes.short || text(afterSnapshot?.message, 'Applied')}`,
          title: 'Healing Receipt',
          details: [
            receiptDetail('Where', locationLabel(afterSnapshot)),
            ...changes.details,
            receiptDetail('Why', 'Kai Healing can restore 1 END in an eligible non-combat section.'),
            receiptDetail('How', 'You clicked Apply in the Kai Healing helper. The assistant capped END at maximum and saved.'),
            output,
            ...achievements
          ].filter(Boolean)
        };
      }

      if (actionName === 'section_loss') {
        return {
          summary: `Loss Choice - ${changes.itemShort || changes.short || text(afterSnapshot?.message, 'Updated')}`,
          title: 'Loss Choice Receipt',
          details: [
            receiptDetail('Where', locationLabel(afterSnapshot)),
            ...changes.details,
            receiptDetail('Why', 'The section asked you to choose which carried item was lost.'),
            receiptDetail('How', 'You clicked Remove beside the item you chose. The assistant removed that item and saved.'),
            output,
            ...achievements
          ].filter(Boolean)
        };
      }

      if (['combat_start', 'section_combat_start', 'combat_round', 'combat_auto', 'combat_evade', 'combat_stop'].includes(actionName)) {
        const receipt = combatReceipt(payload, beforeSnapshot, afterSnapshot, changes);
        if (receipt) {
          receipt.details = [...receipt.details, output, ...achievements].filter(Boolean);
          return receipt;
        }
      }

      if (actionName === 'death_recovery') {
        const mode = text(payload.mode, 'repeat').toLowerCase();
        const label = mode === 'rewind' ? 'Rewound' : 'Repeated';
        return {
          summary: `Death - ${label} section ${text(stateFrom(afterSnapshot).CurrentSection, '?')}`,
          title: 'Death Recovery',
          details: [
            receiptDetail('Choice', label),
            receiptDetail('Restored', locationLabel(afterSnapshot)),
            ...changes.details,
            receiptDetail('Why', mode === 'rewind' ? 'Rewind restores the previous section checkpoint so you can choose another route.' : 'Repeat restores the current section entry state so you can try the same fight or roll again.'),
            receiptDetail('How', 'The assistant restored the saved checkpoint, kept achievement history, and saved the game.'),
            output,
            ...achievements
          ].filter(Boolean)
        };
      }

      if (['complete_book', 'continue_book', 'repeat_book'].includes(actionName)) {
        const completion = afterSnapshot?.bookComplete || {};
        const summary = completion.Summary || {};
        const bookTitle = text(summary.BookTitle || bookByNumber(characterFrom(beforeSnapshot).BookNumber)?.title || bookByNumber(characterFrom(afterSnapshot).BookNumber)?.title, 'Book');
        const verb = actionName === 'complete_book' ? 'Completed' : (actionName === 'repeat_book' ? 'Repeated' : 'Continued');
        return {
          summary: `Book - ${verb} ${bookTitle}`,
          title: 'Book Receipt',
          details: [
            receiptDetail('Book', bookTitle),
            receiptDetail('Where', locationLabel(afterSnapshot)),
            ...changes.details,
            receiptDetail('Why', actionName === 'complete_book' ? 'The current section is marked as a successful book ending.' : 'You selected a book handoff or replay option from the completion screen.'),
            receiptDetail('How', 'The assistant updated campaign progress, book state, and saves.'),
            output,
            ...achievements
          ].filter(Boolean)
        };
      }

      if (achievements.length) {
        const unlocks = arr(afterSnapshot?.achievementUnlocks);
        const progress = achievements.filter((item) => item?.label === 'Progress');
        return {
          summary: unlocks.length === 1 ? `Achievement - ${text(unlocks[0].Name, 'Achievement')} unlocked` : `Achievement - ${unlocks.length} unlocked`,
          title: 'Achievement Receipt',
          details: [
            receiptDetail('Unlocked', unlocks.map((entry) => text(entry.Name, 'Achievement')).join(', ')),
            receiptDetail('Why', 'The assistant matched an achievement rule after the last action.'),
            ...progress
          ].filter(Boolean)
        };
      }

      if (actionName === 'roll') {
        return {
          summary: `Roll - ${text(afterSnapshot?.message, 'Rolled 0-9')}`,
          title: 'Roll Receipt',
          details: [
            receiptDetail('Where', locationLabel(afterSnapshot)),
            receiptDetail('Result', text(afterSnapshot?.message)),
            receiptDetail('Why', 'Lone Wolf random checks use digits from 0 to 9. Section-aware roll rules are applied when the audit has one.')
          ].filter(Boolean)
        };
      }

      if (actionName === 'shutdown') {
        return {
          summary: 'System - Server shutting down',
          title: 'System Notice',
          details: [receiptDetail('Status', text(afterSnapshot?.message, 'Lone Wolf assistant server is shutting down.'))].filter(Boolean)
        };
      }

      return {
        summary: text(afterSnapshot?.message, 'Updated.'),
        title: 'Assistant Notice',
        details: base
      };
    }

    function bookUrl(bookNumber, section) {
      const book = bookByNumber(bookNumber);
      if (!hasInstalledBookFiles(book.number)) {
        return `install-books.html?book=${book.number}`;
      }
      if (Number.isInteger(section) && section >= 1 && section <= book.sections) {
        return `books/lw/${book.folder}/sect${section}.htm`;
      }
      return `books/lw/${book.folder}/title.htm`;
    }

    function hasInstalledBookFiles(bookNumber) {
      const entry = arr(bookFiles?.Books).find((item) => Number(item.BookNumber) === Number(bookNumber));
      return entry ? entry.Installed === true : true;
    }

    function currentBookFilesInstalled() {
      return hasInstalledBookFiles(currentCharacter().BookNumber);
    }

    function loadBook(bookNumber, section = null) {
      const book = bookByNumber(bookNumber);
      activeBook = book.number;
      activeSection = Number.isInteger(Number(section)) ? Number(section) : null;
      if (activeSection && (activeSection < 1 || activeSection > book.sections)) activeSection = null;
      bookFrame.src = bookUrl(activeBook, activeSection);
      renderReaderTitle();
    }

    function renderReaderTitle() {
      const book = bookByNumber(activeBook);
      readerTitle.textContent = activeSection ? `${book.number}. ${book.title} - Section ${activeSection}` : `${book.number}. ${book.title}`;
      document.querySelectorAll('.book-button').forEach((button) => {
        button.classList.toggle('active', Number(button.dataset.book) === activeBook);
      });
    }

    function sectionTargetFromUrl(url) {
      const match = url.pathname.match(/\/books\/lw\/([^/]+)\/sect(\d+)\.htm$/i);
      if (!match) return null;
      const book = books.find((item) => item.folder === match[1]);
      const section = Number(match[2]);
      if (!book || !Number.isInteger(section) || section < 1 || section > book.sections) return null;
      return { book: book.number, section };
    }

    async function fetchState() {
      const [response, bookResponse] = await Promise.all([
        fetch('/api/state', { cache: 'no-store' }),
        fetch('/api/book-files', { cache: 'no-store' }).catch(() => null)
      ]);
      if (!response.ok) throw new Error('Could not load state');
      app = await response.json();
      if (bookResponse?.ok) bookFiles = await bookResponse.json();
      syncUiPreferences(app.uiPreferences);
      serverStatus.textContent = 'Connected';
      syncBookToState();
      setReceipt(sectionStatusReceipt());
      render();
    }

    async function action(payload) {
      const beforeAction = cloneAppSnapshot(app);
      const response = await fetch('/api/action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      app = await response.json();
      if (!response.ok) throw new Error(app.error || 'Action failed');
      syncUiPreferences(app.uiPreferences);
      setReceipt(withSectionStatus(buildActionReceipt(payload, beforeAction, app)));
      showAchievementUnlocks(app.achievementUnlocks);
      syncBookToState();
      render();
    }

    function showAchievementUnlocks(unlocks) {
      const entries = arr(unlocks);
      if (!toastStack || !entries.length) return;
      entries.forEach((entry) => {
        const toast = document.createElement('div');
        toast.className = 'achievement-toast';
        toast.innerHTML = `
          <small>Achievement Unlocked</small>
          <strong>${escapeHtml(text(entry.Name, 'Achievement'))}</strong>
        `;
        toastStack.appendChild(toast);
        window.setTimeout(() => {
          toast.remove();
        }, 6500);
      });
    }

    function syncBookToState() {
      const character = currentCharacter();
      const section = Number(app.state.CurrentSection);
      if (activeBook !== Number(character.BookNumber) || activeSection !== section) {
        loadBook(Number(character.BookNumber), section);
      }
    }

    function render() {
      setModeIndicator();
      renderStatus();
      if (isCliMode()) {
        renderCliPanel();
        return;
      }
      renderQuickPanel();
      renderTabs();
      if (currentDeath().Active) {
        renderDeathScreen();
        decorateInterfaceCards('death');
        return;

        inventory: renderInventory,

        achievements: renderAchievements,

        notes: renderNotes,
        settings: renderSettings
      };
      (renderers[activeView] || renderers.sheet)();
      decorateInterfaceCards(activeView);
    }

      stopCliTerminal();
      quickPanel.innerHTML = '';

      view.innerHTML = `
        <div class="panel cli-terminal-panel">

            <span class="cli-terminal-status" id="cliTerminalStatus">Connecting...</span>
            <button type="button" data-cli-reconnect>Reconnect</button>
            <button type="button" data-mode-set="auto">Auto Mode</button>
            <button type="button" data-mode-set="manual">Manual Mode</button>

    function cliWsUrl() {
      const params = new URLSearchParams(window.location.search);
      const savedPort = localStorage.getItem('lonewolf_redux.wsPort') || localStorage.getItem('lonewolf_redux.wsPort') || '';
      const port = params.get('wsPort') || savedPort || '8798';
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const host = window.location.hostname || 'localhost';
      return `${protocol}//${host}:${port}`;
    }

    function sendCliResize() {
      if (!cliSocket || cliSocket.readyState !== WebSocket.OPEN || !cliTerminal) return;
      cliSocket.send(`\x00${JSON.stringify({ type: 'resize', rows: cliTerminal.rows, cols: cliTerminal.cols })}`);
    }

    function updateCliStatus(textValue) {
      const status = document.getElementById('cliTerminalStatus');
      if (status) status.textContent = textValue;
    }

    function cssVar(name, fallback) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || fallback;
    }

    function cliTheme() {
      return {
        background: cssVar('--lw-bg', '#050704'),
        foreground: cssVar('--lw-text', '#efe8d0'),
        cursor: cssVar('--lw-accent', '#f2d27a'),
        selectionBackground: cssVar('--lw-border-strong', '#594a2a'),
        black: cssVar('--lw-bg', '#050704'),
        red: cssVar('--lw-danger', '#ff8f80'),
        green: '#a9d18e',
        yellow: cssVar('--lw-accent', '#f2d27a'),
        blue: '#93b7ff',
        magenta: '#d8a8ff',
        cyan: '#8bd3dd',
        white: cssVar('--lw-text', '#efe8d0')
      };
    }

    function startCliTerminal() {
      const container = document.getElementById('cliTerminalContainer');
      if (!container || !isCliMode()) return;
      if (!window.Terminal) {
        container.innerHTML = '<div class="mode-note">Terminal assets did not load. Check your internet connection, then use Reconnect or switch back to Auto mode.</div>';
        updateCliStatus('Terminal unavailable');
        return;
      }
      container.innerHTML = '';

      cliTerminal = new Terminal({
        cursorBlink: true,
        convertEol: true,
        fontFamily: 'Consolas, "Cascadia Mono", "Courier New", monospace',
        fontSize: 14,
        theme: cliTheme()
      });
      if (window.FitAddon?.FitAddon) {
        cliFitAddon = new FitAddon.FitAddon();
        cliTerminal.loadAddon(cliFitAddon);
      }
      cliTerminal.open(container);
      cliFitAddon?.fit();
      cliTerminal.writeln('Connecting to Lone Wolf CLI...');

      const wsUrl = cliWsUrl();
      cliSocket = new WebSocket(wsUrl);
      cliSocket.addEventListener('open', () => {
        updateCliStatus('Connected');
        cliTerminal.focus();
        cliFitAddon?.fit();
        sendCliResize();
      });
      cliSocket.addEventListener('message', (event) => {
        cliTerminal.write(typeof event.data === 'string' ? event.data : String(event.data));
      });
      cliSocket.addEventListener('close', () => {
        updateCliStatus('Disconnected');
        cliTerminal?.writeln('\r\n[CLI disconnected]');
      });
      cliSocket.addEventListener('error', () => {
        updateCliStatus('Connection error');
        cliTerminal?.writeln('\r\n[Could not connect to the CLI bridge. Make sure the launcher started the WebSocket server.]');
      });
      cliTerminal.onData((data) => {
        if (cliSocket?.readyState === WebSocket.OPEN) cliSocket.send(data);
      });
      cliResizeHandler = () => {
        cliFitAddon?.fit();
        sendCliResize();
      };
      window.addEventListener('resize', cliResizeHandler);
    }

    function stopCliTerminal(dispose = true) {
      if (cliResizeHandler) {
        window.removeEventListener('resize', cliResizeHandler);
        cliResizeHandler = null;
      }
      if (cliSocket) {
        try { cliSocket.close(); } catch {}
        cliSocket = null;
      }
      if (dispose && cliTerminal) {
        try { cliTerminal.dispose(); } catch {}
      }
      cliTerminal = null;
      cliFitAddon = null;
    }

    async function setPlayMode(mode) {
      const nextMode = normalizePlayMode(mode);
      const previousMode = playMode;
      if (nextMode === previousMode) {
        closeMenus();
        return;
      }
      if (nextMode === 'cli' && app) {
        await action({ action: 'save', path: '' });
      }
      if (previousMode === 'cli' && nextMode !== 'cli') {
        stopCliTerminal();
      }
      playMode = nextMode;
      localStorage.setItem(playModeKey, playMode);
      closeMenus();
      setModeIndicator();
      if (previousMode === 'cli' && nextMode !== 'cli') {
        await action({ action: 'reload_last_save' });
        return;
      }
      render();
    }

    function cardScopeForView(scope) {

    function cardStorageKey(prefix, scope) {
      return `${prefix}${scope}`;
    }

    function isUiPreferenceStorageKey(key) {
      return uiPreferenceStaticKeys.includes(key) || uiPreferencePrefixes.some((prefix) => key.startsWith(prefix));
    }

    function uiPreferenceStorageKeys() {
      const keys = new Set(uiPreferenceStaticKeys);
      Object.keys(localStorage).forEach((key) => {
        if (isUiPreferenceStorageKey(key)) keys.add(key);
      });
      return Array.from(keys);
    }

    function collectUiPreferences() {
      const values = {};
      uiPreferenceStorageKeys().forEach((key) => {
        const value = localStorage.getItem(key);
        if (value !== null) values[key] = value;
      });
      Object.assign(values, settingsApi.settingsToValues(settingsApi.readLocal()));
      return { version: 1, values };
    }

    function hasUiPreferenceValues(preferences) {
      return Boolean(preferences?.values && typeof preferences.values === 'object' && Object.keys(preferences.values).length);
    }

    function hasLocalUiPreferenceValues() {
      return uiPreferenceStorageKeys().some((key) => localStorage.getItem(key) !== null);
    }

    function applyUiPreferences(preferences) {
      const values = preferences?.values && typeof preferences.values === 'object' ? preferences.values : {};
      const preservedAppearance = {};
      Object.entries(settingsApi.settingsToValues(settingsApi.readLocal())).forEach(([key, value]) => {
        if (!(key in values)) preservedAppearance[key] = value;
      });
      uiPreferenceSaveSuspended = true;
      uiPreferenceStorageKeys().forEach((key) => {
        if (appearancePreferenceKeys.includes(key) && !(key in values)) return;
        if (!(key in values)) localStorage.removeItem(key);
      });
      Object.entries(values).forEach(([key, value]) => {
        if (isUiPreferenceStorageKey(key)) localStorage.setItem(key, String(value));
      });
      Object.entries(preservedAppearance).forEach(([key, value]) => {
        localStorage.setItem(key, String(value));
      });
      uiPreferenceSaveSuspended = false;
      uiPreferencesReady = true;
      assistantSettings = settingsApi.apply(settingsApi.readLocal());
      settingsApi.injectReaderTheme(bookFrame, assistantSettings);
      if (Object.keys(preservedAppearance).length) persistUiPreferences(true);
    }

    function syncUiPreferences(preferences) {
      if (uiPreferencesReady) return;
      if (!hasUiPreferenceValues(preferences) && hasLocalUiPreferenceValues()) {
        uiPreferencesReady = true;
        persistUiPreferences(true);
        return;
      }
      applyUiPreferences(preferences || { version: 1, values: {} });
    }

    function persistUiPreferences(immediate = false) {
      if (!uiPreferencesReady || uiPreferenceSaveSuspended) return;
      if (uiPreferenceSaveTimer) window.clearTimeout(uiPreferenceSaveTimer);
      const payload = collectUiPreferences();
      const save = async () => {
        try {
          await fetch('/api/ui-preferences', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        } catch {}
      };
      if (immediate) {
        save();
      } else {
        uiPreferenceSaveTimer = window.setTimeout(save, 180);
      }
    }

    async function updateAssistantSetting(kind, id) {
      assistantSettings = await settingsApi.savePatch({ [kind]: id });
      settingsApi.injectReaderTheme(bookFrame, assistantSettings);
      persistUiPreferences(true);
      render();
    }

    function getJsonStorage(key, fallback) {
      try {
        const saved = localStorage.getItem(key);
        return saved ? JSON.parse(saved) : fallback;
      } catch {
        return fallback;
      }
    }

    function setJsonStorage(key, value) {
      const next = JSON.stringify(value);
      if (localStorage.getItem(key) === next) return;
      localStorage.setItem(key, next);
      if (isUiPreferenceStorageKey(key)) persistUiPreferences();
    }

    function getCardLayout(scope) {
      const layout = getJsonStorage(cardStorageKey(cardLayoutPrefix, scope), []);
      return Array.isArray(layout) ? layout.filter(Boolean) : [];
    }

    function setCardLayout(scope, layout) {
      setJsonStorage(cardStorageKey(cardLayoutPrefix, scope), arr(layout).map((item) => text(item)).filter(Boolean));
      persistUiPreferences(true);
    }

    function getCardSizes(scope) {
      const sizes = getJsonStorage(cardStorageKey(cardSizePrefix, scope), {});
      return sizes && typeof sizes === 'object' && !Array.isArray(sizes) ? sizes : {};
    }

    function getCardSize(scope, id, defaultSize = 'large') {
      const size = text(getCardSizes(scope)[id], defaultSize);
      return ['small', 'medium', 'large'].includes(size) ? size : defaultSize;
    }

    function setCardSize(scope, id, size) {
      const sizes = getCardSizes(scope);
      sizes[id] = ['small', 'medium', 'large'].includes(size) ? size : 'large';
      setJsonStorage(cardStorageKey(cardSizePrefix, scope), sizes);
      persistUiPreferences(true);
      render();
    }

    function getClosedCards(scope) {
      const closed = getJsonStorage(cardStorageKey(cardClosedPrefix, scope), []);
      if (!Array.isArray(closed)) return [];
      return closed.map((id) => normalizeCardId(scope, id)).filter(Boolean);
    }

    function setClosedCards(scope, closed) {
      setJsonStorage(
        cardStorageKey(cardClosedPrefix, scope),
        Array.from(new Set(arr(closed).map((item) => normalizeCardId(scope, item)).filter(Boolean)))
      );
      persistUiPreferences(true);
    }

    function getCollapsedCards(scope) {
      const collapsed = getJsonStorage(cardStorageKey(cardCollapsedPrefix, scope), []);
      if (!Array.isArray(collapsed)) return [];
      return collapsed.map((id) => normalizeCardId(scope, id)).filter(Boolean);

    function setCollapsedCards(scope, collapsed) {

    function rememberCardLabel(scope, id, label) {
      const labels = getCardLabels(scope);
